<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>ChatNova - 智能群聊</title>
<!-- 截图标注库（fabric.js）+ 截屏库（html2canvas）CDN + 本地备份 -->
<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js" onerror="window.__fabricCDNFail=true"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" onerror="window.__h2cCDNFail=true"></script>
<script>
  // CDN 失败兜底（提示用户，但功能仍可用降级模式）
  window.addEventListener('load', function() {
    if (window.__fabricCDNFail) console.warn('[CDN] fabric.js 加载失败，标注功能不可用');
    if (window.__h2cCDNFail) console.warn('[CDN] html2canvas 加载失败，截图功能不可用');
  });
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0b0f1a;
  --card: #131827;
  --card2: #1a2035;
  --border: #252d42;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00cec9;
  --red: #ff7675;
  --yellow: #fdcb6e;
  --text: #e2e8f0;
  --text2: #8892a8;
  --hover: #1e2742;
  --radius: 12px;
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}
#app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; box-sizing: border-box; transition: padding-bottom 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }

.auth-wrap {
  height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0b0f1a 0%, #1a1340 50%, #2d1b69 100%);
}
.auth-card {
  width: 380px; padding: 40px 32px; background: rgba(19, 24, 39, 0.85);
  border: 1px solid var(--border); border-radius: 16px; backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}
.auth-logo { text-align: center; font-size: 48px; margin-bottom: 8px; }
.auth-title { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.auth-sub { text-align: center; color: var(--text2); font-size: 13px; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 11px 14px; background: var(--card2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px; transition: border-color 0.2s;
}
.form-input:focus { outline: none; border-color: var(--accent); }
.btn-primary {
  width: 100%; padding: 12px; background: var(--accent); color: #fff; border-radius: 8px;
  font-size: 14px; font-weight: 600; margin-top: 8px; transition: all 0.2s;
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-primary:disabled { background: var(--card2); color: var(--text2); cursor: not-allowed; transform: none; }
.auth-foot { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text2); }
.auth-foot a { color: var(--accent2); cursor: pointer; text-decoration: none; }
.auth-foot a:hover { text-decoration: underline; }
.auth-tip { text-align: center; margin-top: 14px; font-size: 11px; color: var(--text2); line-height: 1.6; }
.error-msg {
  background: rgba(255, 118, 117, 0.12); color: var(--red);
  padding: 10px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 12px;
  border: 1px solid rgba(255, 118, 117, 0.3);
}

.main { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
.sidebar {
  background: var(--card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.sb-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sb-avatar {
  width: 40px; height: 40px; border-radius: 50%; background: var(--card2);
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.sb-user { flex: 1; min-width: 0; }
.sb-name { font-size: 14px; font-weight: 600; }
.sb-role { font-size: 11px; color: var(--text2); }
.btn-icon {
  width: 34px; height: 34px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center; transition: background 0.2s;
}
.btn-icon:hover { background: var(--hover); }
.btn-icon svg { width: 18px; height: 18px; }
.tabs {
  display: flex; padding: 0 12px; gap: 4px; border-bottom: 1px solid var(--border);
}
.tab {
  padding: 12px 14px; font-size: 13px; color: var(--text2); position: relative;
  transition: color 0.2s; cursor: pointer;
}
.tab.active { color: var(--accent2); }
.tab.active::after {
  content: ""; position: absolute; left: 14px; right: 14px; bottom: 0;
  height: 2px; background: var(--accent2); border-radius: 2px;
}
.search { padding: 10px 12px; }
.search input {
  width: 100%; padding: 8px 12px; background: var(--card2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
}
.search input:focus { outline: none; border-color: var(--accent); }
.list { flex: 1; overflow-y: auto; padding: 0 6px 6px; }
.list-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: 8px; cursor: pointer; transition: background 0.15s; margin-bottom: 2px;
}
.list-item:hover { background: var(--hover); }
.list-item.active { background: var(--hover); border-left: 3px solid var(--accent); padding-left: 9px; }
.li-avatar {
  width: 42px; height: 42px; border-radius: 50%; background: var(--card2);
  display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
}
.li-info { flex: 1; min-width: 0; }
.li-row1 { display: flex; align-items: center; justify-content: space-between; }
.li-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-preview { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.badge {
  background: var(--red); color: #fff; font-size: 10px; padding: 1px 6px;
  border-radius: 10px; min-width: 18px; text-align: center; margin-left: 6px;
}
.sb-footer { padding: 4px 12px; border-top: 1px solid var(--border); }
.btn-new {
  width: 100%; padding: 8px 10px; background: var(--accent); color: #fff; border-radius: 6px;
  font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: background 0.2s; cursor: pointer; min-height: 34px;
}
.btn-new svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn-new:hover { background: var(--accent2); }
.btn-new:disabled { background: var(--card2); color: var(--text2); cursor: not-allowed; }
.btn-new:disabled:hover { background: var(--card2); }

.chat { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: var(--bg); }
.chat-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; background: var(--card);
}
.ch-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 22px; }
.ch-info { flex: 1; }
.ch-name { font-size: 15px; font-weight: 600; }
.ch-meta { font-size: 11px; color: var(--text2); }
.ch-actions { display: flex; gap: 4px; }
.msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 10px; max-width: 75%; }
.msg.me { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.msg-body { display: flex; flex-direction: column; gap: 4px; }
.msg-name { font-size: 11px; color: var(--text2); padding: 0 4px; }
.msg-bubble {
  padding: 10px 14px; background: var(--card2); border-radius: 12px;
  font-size: 14px; line-height: 1.5; word-wrap: break-word; max-width: 100%;
}
.msg.me .msg-bubble { background: var(--accent); color: #fff; }
.msg-bubble.img-bubble,
.msg.me .msg-bubble.img-bubble {
  padding: 0; background: transparent; color: inherit; border-radius: 0;
}
.msg-bubble.img-bubble .msg-img { border-radius: 8px; }
.msg-time { font-size: 10px; color: var(--text2); padding: 0 4px; }
.input-bar {
  padding: 12px 20px; border-top: 1px solid var(--border); background: var(--card);
  display: flex; gap: 10px; align-items: stretch;
}
.input-wrap {
  flex: 1; background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 12px; display: flex; align-items: flex-end; gap: 8px;
}
.input-wrap:focus-within { border-color: var(--accent); }
.msg-input {
  flex: 1; background: none; border: none; color: var(--text); font-size: 14px;
  resize: none; max-height: 200px; min-height: 24px; line-height: 1.5;
  overflow-y: auto;
}
.msg-input:focus { outline: none; }
.btn-send {
  padding: 0 14px; background: var(--accent); color: #fff; border-radius: 8px;
  font-size: 13px; font-weight: 500; transition: background 0.2s; cursor: pointer;
  display: flex; align-items: center; justify-content: center; white-space: nowrap;
}
.btn-send:hover { background: var(--accent2); }
.btn-send:disabled { background: var(--card); color: var(--text2); cursor: not-allowed; }
.empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 14px; }

/* 移动端：侧边栏与聊天区切换显示 */
.back-btn { display: none; }
@media (max-width: 768px) {
  .main { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  .main .sidebar { width: 100%; height: 100%; }
  .main .chat { width: 100%; height: 100%; }
  /* 无活跃聊天 → 只显示侧边栏 */
  .main:not(.chat-active) .chat { display: none; }
  /* 有活跃聊天 → 只显示聊天区，隐藏侧边栏 */
  .main.chat-active .sidebar { display: none; }
  .main.chat-active .chat { display: flex; }
  .back-btn {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
    transition: background 0.2s; flex-shrink: 0;
  }
  .back-btn:hover { background: var(--card2); }
}

.modal-bg {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  width: 90%; max-width: 560px; max-height: 85vh; display: flex; flex-direction: column;
  animation: slideUp 0.25s;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-head {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { width: 28px; height: 28px; border-radius: 6px; color: var(--text2); cursor: pointer; }
.modal-close:hover { background: var(--hover); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; transition: all 0.2s; cursor: pointer; }
.btn-ghost { background: var(--card2); color: var(--text); }
.btn-ghost:hover { background: var(--hover); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #e66767; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent2); }
.btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
.btn-warn { background: var(--yellow); color: #1a1340; }
.btn-warn:hover { background: #f0b94d; }

.admin-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.admin-tab { padding: 8px 14px; font-size: 13px; color: var(--text2); border-bottom: 2px solid transparent; cursor: pointer; }
.admin-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.admin-row {
  display: flex; align-items: center; gap: 10px; padding: 10px;
  background: var(--card2); border-radius: 8px; margin-bottom: 6px;
}
.admin-row .li-name { flex: 1; }
.role-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.role-admin { background: var(--yellow); color: #1a1340; }
.role-whitelist { background: var(--green); color: #0b3b3a; }
.role-member { background: var(--card); color: var(--text2); border: 1px solid var(--border); }

.user-pick { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
.user-pick-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px;
  cursor: pointer; transition: background 0.15s;
}
.user-pick-item:hover { background: var(--hover); }
.user-pick-item.selected { background: var(--hover); border: 1px solid var(--accent); }
.user-pick-item input { accent-color: var(--accent); }

.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border); padding: 10px 20px;
  border-radius: 10px; font-size: 13px; z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

#errPanel {
  display: none; position: fixed; inset: 0; background: #0b0f1a; color: #ff7675;
  padding: 20px; z-index: 9999; font-family: monospace; overflow: auto;
}
#errPanel h2 { color: #ff7675; margin-bottom: 12px; }
#errText { white-space: pre-wrap; font-size: 12px; line-height: 1.6; }
#errPanel button {
  margin-top: 16px; padding: 10px 20px; background: #6c5ce7; color: #fff;
  border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }
.hide-for-member { display: none !important; }

/* ===== 截图 / 标注 / 群消息审核 样式 ===== */
.input-tools { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 6px; color: var(--text2);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--hover); color: var(--text); }
.icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.icon-btn svg { width: 18px; height: 18px; }
.plus-btn { font-size: 20px; font-weight: 700; line-height: 1; }

/* 表情选择器 */
.emoji-panel-wrap { position: relative; }
.emoji-panel {
  height: 0;
  overflow: hidden;
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: height 0.25s cubic-bezier(0.4,0,0.2,1);
}
.emoji-panel.show {
  height: 50vh;
}
.emoji-panel-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.emoji-panel-head {
  display: flex; gap: 2px; padding: 6px 8px; border-bottom: 1px solid var(--border);
  background: var(--card2); overflow-x: auto;
}
.emoji-tab {
  padding: 4px 8px; border-radius: 6px; font-size: 16px; cursor: pointer;
  border: none; background: none; color: var(--text2); transition: all 0.15s; flex-shrink: 0;
}
.emoji-section-title {
  padding: 6px 10px 2px; font-size: 12px; color: var(--text2); font-weight: 600;
}
.emoji-grid {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; padding: 4px 8px 8px;
}
.emoji-item {
  width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 22px; border-radius: 6px; cursor: pointer; border: none; background: none;
  transition: background 0.1s;
}
.emoji-item:hover { background: var(--hover); }

/* + 功能面板（和表情面板同样从底部顶出） */
.plus-menu {
  height: 0;
  overflow: hidden;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: height 0.25s cubic-bezier(0.4,0,0.2,1);
}
.plus-menu.show {
  height: 220px;
}
.plus-menu-body {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
  padding: 24px 16px 16px;
}
.plus-menu-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  cursor: pointer;
  width: 33.33%;
  padding: 10px 0;
  color: var(--text);
  transition: opacity 0.15s;
}
.plus-menu-item:active {
  opacity: 0.6;
}
.plus-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  line-height: 1;
}
.plus-label {
  font-size: 12px;
  color: var(--text-2);
}

/* 消息气泡内的图片 */
.msg-img {
  max-width: 240px; max-height: 240px; border-radius: 8px; cursor: pointer;
  display: block; object-fit: cover;
}
.msg-img:hover { opacity: 0.92; }
.msg-location {
  background: var(--card2); border-radius: 8px; padding: 10px 12px;
  cursor: pointer; max-width: 220px; line-height: 1.5;
}
.msg-location:hover { opacity: 0.85; }
.msg-pending { opacity: 0.6; font-style: italic; }
.msg-pending-tag {
  display: inline-block; font-size: 10px; padding: 1px 6px;
  background: var(--yellow); color: #1a1340; border-radius: 4px; margin-left: 6px;
}
.msg-caption {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.4;
}

/* 截图编辑器 —— 微信风格全屏 */
.modal-bg#shotEditorBg { background: #000; }
.shot-modal {
  width: 100vw; height: 100vh; max-width: none; border-radius: 0;
  display: flex; flex-direction: column; background: #000;
  position: fixed; top: 0; left: 0; z-index: 1000;
}
.shot-modal .modal-head {
  background: rgba(0,0,0,0.85); color: #fff; border-bottom: none;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; flex-shrink: 0; position: relative; z-index: 10;
}
.shot-modal .modal-head .modal-title { color: #fff; font-size: 15px; }
.shot-modal .modal-head .modal-close { color: #fff; font-size: 20px; }
.shot-modal .modal-head .btn-done {
  background: #07c160; color: #fff; border: none; border-radius: 6px;
  padding: 6px 18px; font-size: 14px; cursor: pointer; font-weight: 500;
}
.shot-modal .modal-head .btn-cancel {
  background: transparent; color: #fff; border: none; font-size: 15px; cursor: pointer;
}
.shot-stage {
  position: relative; background: #000; flex: 1; min-height: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.shot-stage canvas { max-width: 100%; max-height: 100%; touch-action: none; }
.shot-toolbar {
  display: flex; gap: 6px; padding: 10px 12px;
  background: rgba(0,0,0,0.85); flex-shrink: 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch; align-items: center;
}
.shot-toolbar::-webkit-scrollbar { display: none; }
.shot-tool {
  min-width: 56px; min-height: 48px; padding: 6px 8px; border-radius: 8px; display: flex;
  flex-direction: column; gap: 2px; align-items: center; justify-content: center; cursor: pointer;
  color: #ccc; transition: all 0.15s; position: relative; border: 1px solid transparent;
  background: transparent; touch-action: manipulation; flex-shrink: 0;
}
.shot-tool:hover { background: rgba(255,255,255,0.15); color: #fff; }
.shot-tool.active { background: rgba(7,193,96,0.35); color: #07c160; border-color: #07c160; }
.shot-tool-icon { font-size: 18px; line-height: 1; }
.shot-tool-label { font-size: 10px; line-height: 1.1; white-space: nowrap; }
.shot-tool[disabled] { opacity: 0.3; cursor: not-allowed; }
.shot-tool--icon { min-width: 48px; }
.shot-tool-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.15); margin: 0 4px; flex-shrink: 0; }
.shot-color {
  min-width: 48px; min-height: 48px; padding: 6px 8px; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; color: #ccc; border: 1px solid transparent; flex-shrink: 0;
}
.shot-color input { width: 28px; height: 28px; border: none; background: none; cursor: pointer; padding: 0; }

    String(d.getDate()).padStart(2, '0') + ' ' +
    String(d.getHours()).padStart(2, '0') + ':' +

  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];

  el.style.height = 'auto';

function sendLocation() {
  if (!navigator.geolocation) {
    showToast('该浏览器不支持定位功能');
    return;
  }
  // HTTP 环境且不是 localhost 时，geolocation 可能被阻止
  var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if (location.protocol === 'http:' && !isLocal) {
    showToast('定位功能需要 HTTPS 环境，请使用 https 访问');
    return;
  }
  showToast('正在获取位置...');
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude.toFixed(6);
    var lng = pos.coords.longitude.toFixed(6);
    state._pendingLocation = 'LOC:' + lat + ',' + lng;
    doSend();
  }, function(err) {
    var msg = '获取位置失败';
    if (err.code === 1) msg = '用户拒绝了定位请求';
    else if (err.code === 2) msg = '无法获取位置信息';
    else if (err.code === 3) msg = '获取位置超时';
    showToast(msg);
  }, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 30000
  });
}

function loadStore() {
  try { var raw = localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : null; }
  catch (e) { return null; }

  try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch (e) {}

var store = loadStore() || {

};
var regRequests = loadRegRequests();
regRequests = regRequests.map(function(req) {
  if (!req.id) req.id = genId('reg');

});

(function migrateStore() {
  if (!store.users) store.users = [];
  if (!Array.isArray(store.messages)) {
    var normalizedMessages = [];
    if (store.messages && typeof store.messages === 'object') {
      Object.keys(store.messages).forEach(function(key) {
        var value = store.messages[key];
        if (Array.isArray(value)) {
          normalizedMessages = normalizedMessages.concat(value);
        } else if (value && typeof value === 'object' && value.id) {
          normalizedMessages.push(value);
        }
      });
    }
    store.messages = normalizedMessages;
  }
  if (!store.groups) store.groups = [];
  if (!('currentUserId' in store)) store.currentUserId = null;
  store.users.forEach(function(u) {
    if (!u.id) u.id = genId('user');
    if (!u.avatar) u.avatar = AVATARS[0];
    if (!u.password) u.password = '123456';
    if (!u.role) u.role = 'whitelist';
  });
  if (!store.users.find(function(u) { return u.id === SYSTEM_ADMIN_ID; })) {
    store.users.unshift({ id: SYSTEM_ADMIN_ID, name: 'admin', avatar: '\u{1F451}', role: 'admin', password: 'admin123' });
  }
  store.groups.forEach(function(g) {
    if (!g.id) g.id = genId('grp');
    if (!g.avatar) g.avatar = '\u{1F465}';
    if (!g.creatorId) g.creatorId = SYSTEM_ADMIN_ID;
    if (!g.memberIds) g.memberIds = [SYSTEM_ADMIN_ID];
    if (!g.msgs) g.msgs = [];
  });
  (store.messages || []).forEach(function(m) {
    if (!m.id) m.id = genId('msg');
    if (!m.time) m.time = now();
    if (!('timestamp' in m)) m.timestamp = Date.now();
    if (!('read' in m)) m.read = false;

  store._version = STORE_VERSION;

})();

function me() { return store.users.find(function(u) { return u.id === store.currentUserId; }); }
function roleName(role) { return role === 'admin' ? '管理员' : (role === 'whitelist' ? '白名单' : '普通成员'); }
function canCreateGroup() { var r = me(); return r && (r.role === 'admin' || r.role === 'whitelist'); }
function isAdmin() { var r = me(); return r && r.role === 'admin'; }

function groupById(id) { return store.groups.find(function(g) { return g.id === id; }); }

  if (role === 'admin') return '<span class="role-tag role-admin">\u{1F451} 管理员</span>';

function getMessages(chat) {
  if (chat.type === 'user') {
    return store.messages.filter(function(m) {
      return m.type === 'user' &&
        ((m.from === chat.id && m.to === store.currentUserId) ||
         (m.to === chat.id && m.from === store.currentUserId));
    });
  } else {
    var g = groupById(chat.id);
    return g ? g.msgs : [];
  }
}

  var msgs = getMessages(chat);

}

function bindAuth() {
  if (state.authMode === 'login') {
    $('#btnLogin').onclick = doLogin;
    $('#goReg').onclick = function() { state.authMode = 'register'; state.loginError = ''; render(); };
    $('#loginPwd').onkeydown = function(e) { if (e.key === 'Enter') doLogin(); };
    setTimeout(function() { $('#loginName').focus(); }, 50);
  } else {
    $('#btnReg').onclick = doRegister;
    $('#goLogin').onclick = function() { state.authMode = 'login'; state.regError = ''; render(); };
    document.querySelectorAll('[data-reg-ava]').forEach(function(d) {
      d.onclick = function() { state.regAvatarIdx = parseInt(this.dataset.regAva, 10); render(); };
    });
    $('#regPwd2').onkeydown = function(e) { if (e.key === 'Enter') doRegister(); };
    setTimeout(function() { $('#regName').focus(); }, 50);
  }
}

function doLogin() {
  state.loginError = '';
  var name = $('#loginName').value.trim();
  var pwd = $('#loginPwd').value;
  if (!name) { state.loginError = '请输入账号'; render(); return; }
  if (!pwd) { state.loginError = '请输入密码'; render(); return; }
  var u = store.users.find(function(x) { return x.name === name && x.password === pwd; });
  if (!u) {
    state.loginError = '账号或密码错误';
    render(); return;
  }
  store.currentUserId = u.id;
  saveStore();
  state.view = 'main';
  // 普通成员默认看不到联系人，直接进群组 tab
  state.activeTab = (u.role === 'member') ? 'groups' : 'contacts';
  state.activeChat = null;
  render();
  // 普通成员隐藏联系人 tab
  var tabContacts = document.getElementById('tab-contacts');
  if (tabContacts) tabContacts.style.display = (u.role === 'member') ? 'none' : '';
  showToast('欢迎回来，' + u.name);
}

function doRegister() {
  state.regError = '';
  var name = $('#regName').value.trim();
  var pwd = $('#regPwd').value;
  var pwd2 = $('#regPwd2').value;
  if (!name || name.length < 2 || name.length > 20) { state.regError = '账号长度需在 2-20 字符之间'; render(); return; }
  if (store.users.find(function(u) { return u.name === name; })) { state.regError = '该账号已被占用'; render(); return; }
  if (!pwd || pwd.length < 4) { state.regError = '密码至少 4 位'; render(); return; }
  if (pwd !== pwd2) { state.regError = '两次密码输入不一致'; render(); return; }
  // 直接创建账号，无需审核
  var newUser = {
    id: genId('user'),
    name: name,
    avatar: AVATARS[state.regAvatarIdx] || AVATARS[0],
    password: pwd,
    role: 'member',
    createdAt: now()
  };
  store.users.push(newUser);
  saveStore();
  // 同时写入 regRequests 供管理员查看历史（可选）
  try {
    var regRequests = JSON.parse(localStorage.getItem('chatnova_reg_requests')) || [];
    regRequests.push({
      id: genId('reg'),
      name: name,
      avatar: newUser.avatar,
      password: pwd,
      status: 'approved',
      createdAt: newUser.createdAt,
      reviewedAt: newUser.createdAt
    });
    localStorage.setItem('chatnova_reg_requests', JSON.stringify(regRequests));
  } catch(e) {}
  state.regError = '';
  state.authMode = 'login';
  state.loginError = '';
  render();
  showToast('注册成功！已自动创建账号，请登录');
}

function renderContactsList() {
  // 普通成员禁止查看联系人列表
  if (me().role === 'member') return '<div class="empty">普通成员不能发起私聊<br>请在群组里交流</div>';
  var q = state.search.toLowerCase();
  var list = store.users.filter(function(u) { return u.id !== store.currentUserId; })
    .filter(function(u) { return !q || u.name.toLowerCase().indexOf(q) >= 0; });
  if (list.length === 0) return '<div class="empty">暂无联系人</div>';
  return list.map(function(u) {
    var chat = { type: 'user', id: u.id };
    var lm = getLastMsg(chat);
    var unread = getUnreadCount(chat);
    var isActive = state.activeChat && state.activeChat.type === 'user' && state.activeChat.id === u.id;
    return '' +
      '<div class="list-item ' + (isActive ? 'active' : '') + '" data-chat-type="user" data-chat-id="' + u.id + '">' +
        '<div class="li-avatar">' + u.avatar + '</div>' +
        '<div class="li-info">' +
          '<div class="li-row1"><div class="li-name">' + escapeHtml(u.name) + roleBadge(u.role) + '</div></div>' +
          '<div class="li-preview">' + (lm ? escapeHtml(lm.text) : '<span style="color:var(--text2)">点击开始聊天</span>') + '</div>' +
        '</div>' +
        (unread > 0 ? '<div class="badge">' + unread + '</div>' : '') +
      '</div>';
  }).join('');
}

function renderGroupsList() {
  var q = state.search.toLowerCase();
  var list = store.groups.filter(function(g) { return g.memberIds.indexOf(store.currentUserId) >= 0; })
    .filter(function(g) { return !q || g.name.toLowerCase().indexOf(q) >= 0; });
  if (list.length === 0) return '<div class="empty">暂未加入任何群组</div>';
  return list.map(function(g) {
    var chat = { type: 'group', id: g.id };
    var lm = getLastMsg(chat);
    var unread = getUnreadCount(chat);
    var isActive = state.activeChat && state.activeChat.type === 'group' && state.activeChat.id === g.id;
    return '' +
      '<div class="list-item ' + (isActive ? 'active' : '') + '" data-chat-type="group" data-chat-id="' + g.id + '">' +
        '<div class="li-avatar">' + g.avatar + '</div>' +
        '<div class="li-info">' +
          '<div class="li-row1"><div class="li-name">' + escapeHtml(g.name) + ' <span style="color:var(--text2);font-size:11px">(' + g.memberIds.length + ')</span></div></div>' +
          '<div class="li-preview">' + (lm ? (lm.from === store.currentUserId ? '我: ' : '') + escapeHtml(lm.text) : '<span style="color:var(--text2)">暂无消息</span>') + '</div>' +
        '</div>' +
        (unread > 0 ? '<div class="badge">' + unread + '</div>' : '') +
      '</div>';
  }).join('');
}

function renderEmpty() {
  return '<div class="chat"><div class="empty"><div><div style="font-size:64px;margin-bottom:16px">\u{1F4AC}</div>选择一个联系人或群组开始聊天</div></div></div>';
}

function renderChatArea() {
  var chat = state.activeChat;
  var title, sub, avatar, infoBtn = '';
  if (chat.type === 'user') {
    var u = userById(chat.id);
    title = u.name; sub = roleName(u.role) + ' · 在线'; avatar = u.avatar;
  } else {
    var g = groupById(chat.id);
    title = g.name; sub = g.memberIds.length + ' 位成员'; avatar = g.avatar;
    infoBtn = '<button class="btn-icon" data-act="group-info">' + ICON.info + '</button>';
  }
  var msgs = getMessages(chat);
  var msgsHtml = msgs.length === 0 ?
    '<div class="empty" style="margin:auto">还没有消息，发出第一条吧～</div>' :
    msgs.map(function(m) {
      var mine = m.from === store.currentUserId;
      var sender = mine ? me() : userById(m.from);
      // 群消息 pending：仅发送者自己可见（审核中）
      var isPending = m.reviewStatus === 'pending';
      if (isPending && !mine) return '';
      // 内容渲染：位置 / 图片 / 文字
      var bodyHtml;
      if (m.text && m.text.indexOf('LOC:') === 0) {
        var locParts = m.text.slice(4).split(',');
        var lat = locParts[0] || '';
        var lng = (locParts[1] || '').split('|')[0];
        bodyHtml = '<div class="msg-location" onclick="window.open(\'https://map.qq.com/m/?latlng=' + lat + ',' + lng + '&title=\u5730\u70B9\u5206\u4EAB\')">' +
          '<div style="font-size:13px;font-weight:600;margin-bottom:4px">\uD83D\uDCC1 \u4F4D\u7F6E\u5206\u4EAB</div>' +
          '<div style="font-size:11px;color:var(--text2)">\u7EAC\u5EA6: ' + lat + '</div>' +
          '<div style="font-size:11px;color:var(--text2)">\u7ECF\u5EA6: ' + lng + '</div>' +
          '<div style="font-size:11px;color:var(--blue);margin-top:6px">\u70B9\u51FB\u6253\u5F00\u5730\u56FE \u203A</div>' +
          '</div>';
      } else if (m.text && m.text.indexOf('IMG:') === 0) {
        bodyHtml = '<img class="msg-img" src="' + m.text.slice(4) + '" onclick="window.open(this.src)" alt="图片">';
      } else {
        bodyHtml = escapeHtml(m.text);
      }
      var captionHtml = m.caption ? '<div class="msg-caption">' + escapeHtml(m.caption) + '</div>' : '';
      var pendingTag = isPending ? '<span class="msg-pending-tag">审核中</span>' : '';
      var pendingClass = isPending ? ' msg-pending' : '';
      var imgClass = (m.text && m.text.indexOf('IMG:') === 0) ? ' img-bubble' : '';
      return '' +
        '<div class="msg ' + (mine ? 'me' : '') + '">' +
          '<div class="msg-avatar">' + (sender ? sender.avatar : '\u{1F464}') + '</div>' +
          '<div class="msg-body">' +
            (chat.type === 'group' && !mine ? '<div class="msg-name">' + escapeHtml(sender ? sender.name : '未知') + '</div>' : '') +
            '<div class="msg-bubble' + imgClass + pendingClass + '">' + bodyHtml + pendingTag + '</div>' +
            captionHtml +
            '<div class="msg-time">' + m.time + '</div>' +
          '</div>' +
        '</div>';
    }).join('');
  return '' +
    '<div class="chat">' +
      '<div class="chat-header">' +
        '<div class="back-btn" data-act="back-to-list" title="返回">' + ICON.back + '</div>' +
        '<div class="ch-avatar">' + avatar + '</div>' +
        '<div class="ch-info"><div class="ch-name">' + escapeHtml(title) + '</div><div class="ch-meta">' + sub + '</div></div>' +
        '<div class="ch-actions">' + infoBtn + '</div>' +
      '</div>' +
      renderGroupReviewPanel() +
      '<div class="msgs" id="msgList">' + msgsHtml + '</div>' +
      '<div class="input-bar">' +
        '<div class="input-tools">' +
          '<button id="plusBtn" class="icon-btn plus-btn" title="更多功能">+</button>' +
          '<input type="file" id="filePicker" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">' +

function renderEmojiPanel() {
  var sectionNames = ['笑脸', '手势', '爱心', '物品'];
  var cls = state.showEmoji ? 'emoji-panel show' : 'emoji-panel';
  var html = '<div id="emojiPanel" class="' + cls + '">';
  html += '<div class="emoji-panel-body">';
  // emoji 字符可能含 " 或 &，必须 HTML 转义后放进 data-emoji 属性
  function escapeAttr(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  EMOJI_DATA.forEach(function(emojis, idx) {
    html += '<div class="emoji-section-title">' + sectionNames[idx] + '</div>';
    html += '<div class="emoji-grid">';
    emojis.forEach(function(e) {
      html += '<button class="emoji-item" data-emoji="' + escapeAttr(e) + '">' + e + '</button>';
    });
    html += '</div>';
  });
  html += '</div>';
  html += '</div>';
  return html;
}

function bindEmojiEvents() {
  // 点击表情插入输入框（stopPropagation 防止全局监听器误判为"点外面"）
  document.querySelectorAll('[data-emoji]').forEach(function(el) {
    el.onclick = function(e) {
      e.stopPropagation();
      var mi = $('#msgInput');
      var emoji = this.dataset.emoji;
      if (mi && emoji) {
        var start = mi.selectionStart;
        var end = mi.selectionEnd;
        var v = mi.value;
        mi.value = v.slice(0, start) + emoji + v.slice(end);
        mi.selectionStart = mi.selectionEnd = start + emoji.length;
        state.draft = mi.value;
        autoGrow(mi);
      }
    };
  });
}

function bindMain() {
  var root = $('#app');
  root.querySelectorAll('.tab').forEach(function(t) {
    t.onclick = function() {
      // 普通成员禁止切换到联系人 tab
      if (this.dataset.tab === 'contacts' && me().role === 'member') {
        showToast('普通成员不能发起私聊，只能在群组里交流');
        return;
      }
      state.activeTab = this.dataset.tab; state.search = ''; render();
    };
  });
  // 同步联系人 tab 显示状态
  var tabContacts = document.getElementById('tab-contacts');
  if (tabContacts) tabContacts.style.display = (me().role === 'member') ? 'none' : '';
  var si = $('#searchInput');
  if (si) si.oninput = function() {
    state.search = this.value;
    $('#chatList').innerHTML = (state.activeTab === 'contacts' ? renderContactsList() : renderGroupsList());
    bindListEvents();
  };
  bindListEvents();
  // 统一 action 分发表（避免遗漏，截图相关 act 也走这里）
  var actionHandlers = {
    'open-admin': function() { state.showAdminPanel = true; render(); },
    'open-account': function() { state.showAccountModal = true; render(); },
    'logout': function() { doLogout(); },
    'back-to-list': function() { state.activeChat = null; saveStore(); render(); },
    'new-group': function() {
      if (!canCreateGroup()) { showToast('仅管理员和白名单可创建群组'); return; }
      state.showCreateGroup = true; state.newGroupName = ''; state.newGroupMembers = []; state.newGroupAvatar = '\u{1F465}'; render();
    },
    'close-bg': function() { closeAllModals(); },
    'close-create-group': function() { state.showCreateGroup = false; render(); },
    'close-admin': function() { state.showAdminPanel = false; render(); },
    'close-group-info': function() { state.showGroupInfo = false; render(); },
    'close-account': function() { state.showAccountModal = false; render(); },
    'confirm-create-group': function() { doCreateGroup(); },
    'group-info': function() { state.showGroupInfo = true; render(); },
    'dissolve-group': function() { doDissolveGroup(); },
    'save-my': function() { doSaveMy(); },
    'save-admin': function() { doSaveAdmin(); },
    // ===== 截图 / 标注 / 审核 =====
    // shot-tool-* 直接检查 canvas 就绪后调用 setShotTool，不依赖 bindShotTools 覆盖
    'shot-tool-rect': function() { toolActivate('rect'); },
    'shot-tool-ellipse': function() { toolActivate('ellipse'); },
    'shot-tool-arrow': function() { toolActivate('arrow'); },
    'shot-tool-pen': function() { toolActivate('pen'); },
    'shot-tool-text': function() { toolActivate('text'); },
    'shot-tool-mosaic': function() { toolActivate('mosaic'); },
    'shot-undo': function() { shotUndo(); },
    'shot-redo': function() { shotRedo(); },
    'shot-clear': function() { shotClear(); },
    'close-shot-crop': function() { state.showShotCrop = false; render(); },
    'close-shot-region': function() { cancelShotRegion(); },
    'confirm-shot-region': function() { confirmShotRegion(); },
    'close-shot-editor': function() { state.showShotEditor = false; render(); },
    'shot-crop-ok': function() { applyCropAndOpenEditor(); },
    'shot-send': function() { shotSend(); },
    // 旋转（不依赖 canvas，可直接绑定）
    'shot-rotate-left': function() { shotRotate(-90); },
    'shot-rotate-right': function() { shotRotate(90); },
    // 裁剪（编辑器内裁剪：把当前画布内容关掉，进区域选择再回到编辑器）
    'shot-crop-inline': function() { cropFromEditor(); },
    // 群消息审核
    'review-approve': function(el) { reviewMsg(el.dataset.rid, 'approve'); },
    'review-reject': function(el) { reviewMsg(el.dataset.rid, 'reject'); },
    // 相机拍照预览
    'camera-preview-cancel': function() { state.showCameraPreview = false; state._cameraPhoto = ''; render(); },
    'camera-preview-send': function() { cameraPreviewSend(); },
    'camera-preview-edit': function() { cameraPreviewEdit(); },
  };
  // 绑定所有 data-act 按钮（直接绑定，不走事件委托，避免 stopPropagation 冲突）
  root.querySelectorAll('[data-act]').forEach(function(el) {
    el.onclick = function(e) {
      e.stopPropagation();
      var handler = actionHandlers[el.dataset.act];
      if (handler) handler(el);
    };
  });
  root.querySelectorAll('[data-admin-tab]').forEach(function(t) {
    t.onclick = function() {
      root.querySelectorAll('[data-admin-tab]').forEach(function(x) { x.classList.remove('active'); });
      this.classList.add('active');
      var tab = this.dataset.adminTab;
      if (tab === 'users') $('#adminContent').innerHTML = renderAdminUsers();
      else if (tab === 'reg') $('#adminContent').innerHTML = renderAdminReg();
      else if (tab === 'acct') $('#adminContent').innerHTML = renderAdminAcct();
      bindAdminActions();
    };
  });
  bindAdminActions();
  root.querySelectorAll('[data-avatar]').forEach(function(d) {
    d.onclick = function() { state.newGroupAvatar = this.dataset.avatar; render(); };
  });
  var gn = $('#grpName');
  if (gn) gn.oninput = function() { state.newGroupName = this.value; };
  root.querySelectorAll('[data-pick-user]').forEach(function(d) {
    d.onclick = function() {
      var uid = this.dataset.pickUser;
      var i = state.newGroupMembers.indexOf(uid);
      if (i >= 0) state.newGroupMembers.splice(i, 1); else state.newGroupMembers.push(uid);
      render();
    };
  });
  var mi = $('#msgInput');
  if (mi) {
    mi.value = state.draft;
    mi.oninput = function() { state.draft = this.value; this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; };
    mi.onkeydown = function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } };
    // 用户点输入框（isTrusted=true）才收起功能面板；程序化 focus()（isTrusted=false）不收起
    mi.onfocus = function(e) {
      if (!e.isTrusted) return;
      if (state.showEmoji) {
        state.showEmoji = false;
        var panel = document.getElementById('emojiPanel');
        if (panel) panel.className = 'emoji-panel';
      }
      if (state.showPlus) {
        state.showPlus = false;
        var panel = document.getElementById('plusMenu');
        if (panel) panel.className = 'plus-menu';
      }
    };
  }
  var bs = $('#btnSend');
  if (bs) bs.onclick = doSend;
  var ml = $('#msgList');
  if (ml) ml.scrollTop = ml.scrollHeight;

  // 表情按钮：stopPropagation 阻止冒泡，避免和全局监听器冲突
  // 软键盘打开时点表情按钮，先 blur 收起软键盘，再切换面板
  var be = document.getElementById('btnEmoji');
  if (be) be.onclick = function(e) {
    e.stopPropagation();
    if (!state.showEmoji) {
      // 当前面板未打开 → 即将打开面板，先收起软键盘
      var mi2 = $('#msgInput');
      if (mi2) mi2.blur();
    }
    state.showEmoji = !state.showEmoji;
    state.showPlus = false;
    render();
  };

  // ===== 截图 / 标注 专用 bind（shot 工具栏按钮由 initFabricCanvas → bindShotTools 绑定） =====
  var btnShot = $('#btnShot');
  if (btnShot) btnShot.onclick = handleShot;
  var fp = $('#filePicker');
  if (fp) fp.onchange = handleFileSelected;
  var cp = $('#cameraPicker');
  if (cp) cp.onchange = handleCameraSelected;


  // 表情面板事件（按需绑定）
  if (state.showEmoji) bindEmojiEvents();

  // 初始化截图/标注弹窗（按需）
  if (state.showShotRegion) setTimeout(initShotRegionSelector, 60);
  if (state.showShotEditor) setTimeout(initFabricCanvas, 50);

  // 快捷键绑定（截图/标注弹窗）：先清理旧的再绑新的，防止重复注册
  if (state._shotShortcutCleanup) state._shotShortcutCleanup();
  bindShotShortcuts();
}

function bindListEvents() {
  document.querySelectorAll('[data-chat-type]').forEach(function(item) {
    item.onclick = function() {
      // 普通成员禁止私聊
      if (this.dataset.chatType === 'user' && me().role === 'member') {
        showToast('普通成员不能发起私聊，只能在群组里交流');
        return;
      }
      state.activeChat = { type: this.dataset.chatType, id: this.dataset.chatId };
      state.draft = '';
      getMessages(state.activeChat).forEach(function(m) { if (m.from !== store.currentUserId) m.read = true; });
      saveStore();
      render();
    };
  });
}

function bindAdminActions() {
  var root = $('#app');
  root.querySelectorAll('[data-promote]').forEach(function(b) {
    b.onclick = function() { var u = userById(this.dataset.promote); if (u) { u.role = 'admin'; saveStore(); render(); showToast(u.name + ' 已设为管理员'); } };
  });
  root.querySelectorAll('[data-demote]').forEach(function(b) {
    b.onclick = function() { var u = userById(this.dataset.demote); if (u) { u.role = 'member'; saveStore(); render(); showToast(u.name + ' 已降为成员'); } };
  });
  root.querySelectorAll('[data-addwl]').forEach(function(b) {
    b.onclick = function() { var u = userById(this.dataset.addwl); if (u) { u.role = 'whitelist'; saveStore(); render(); showToast(u.name + ' 已加入白名单'); } };
  });
  root.querySelectorAll('[data-rmwl]').forEach(function(b) {
    b.onclick = function() { var u = userById(this.dataset.rmwl); if (u) { u.role = 'member'; saveStore(); render(); showToast(u.name + ' 已移出白名单'); } };
  });
  root.querySelectorAll('[data-del]').forEach(function(b) {
    b.onclick = function() {
      var u = userById(this.dataset.del);
      if (!u) return;
      if (!confirm2('确定要删除用户「' + u.name + '」吗？相关消息会保留。')) return;
      store.users = store.users.filter(function(x) { return x.id !== u.id; });
      store.groups.forEach(function(g) { g.memberIds = g.memberIds.filter(function(x) { return x !== u.id; }); });
      if (store.currentUserId === u.id) {
        store.currentUserId = null;
        state.view = 'login';
        state.authMode = 'login';
        state.activeChat = null;
      } else if (state.activeChat && state.activeChat.type === 'user' && state.activeChat.id === u.id) {
        state.activeChat = null;
      }
      saveStore(); render(); showToast('已删除 ' + u.name);
    };
  });
    root.querySelectorAll('[data-reg-approve]').forEach(function(b) {
    b.onclick = function() {
      var req = regRequests.find(function(r) { return r.id === this.dataset.regApprove; }.bind(b));
      if (!req) return;
      var requestTime = req.createdAt || req.time || Date.now();
      var u = { id: genId('user'), name: req.name, avatar: req.avatar, role: 'member', password: req.password, createdAt: requestTime };
      store.users.push(u);
      regRequests = regRequests.filter(function(r) { return r.id !== req.id; });
      saveRegRequests(regRequests); saveStore();
      showToast('已通过：' + req.name);
      $('#adminContent').innerHTML = renderAdminReg();
      bindAdminActions();
    };
  });
  root.querySelectorAll('[data-reg-reject]').forEach(function(b) {
    b.onclick = function() {
      var rid = this.dataset.regReject;
      regRequests = regRequests.filter(function(r) { return r.id !== rid; });
      saveRegRequests(regRequests);
      showToast('已拒绝');
      $('#adminContent').innerHTML = renderAdminReg();
      bindAdminActions();
    };
  });
}

function doCreateGroup() {
  if (!canCreateGroup()) { showToast('权限不足'); return; }
  var name = state.newGroupName.trim();
  if (!name) { showToast('请输入群名称'); return; }
  if (state.newGroupMembers.length < 2) { showToast('请至少选择 2 位成员'); return; }
  var g = {
    id: genId('grp'),
    name: name,
    avatar: state.newGroupAvatar,
    creatorId: store.currentUserId,
    memberIds: [store.currentUserId].concat(state.newGroupMembers),
    msgs: []
  };
  store.groups.push(g);
  saveStore();
  state.showCreateGroup = false;
  state.activeTab = 'groups';
  state.activeChat = { type: 'group', id: g.id };
  render();
  showToast('群组「' + name + '」创建成功');
}

function doDissolveGroup() {
  var g = groupById(state.activeChat.id);
  if (!g) return;
  if (!confirm2('确定要解散群组「' + g.name + '」吗？此操作不可恢复。')) return;
  store.groups = store.groups.filter(function(x) { return x.id !== g.id; });
  if (state.activeChat && state.activeChat.type === 'group' && state.activeChat.id === g.id) {
    state.activeChat = null;
  }
  saveStore();
  state.showGroupInfo = false;
  state.activeChat = null;
  state.activeTab = 'groups';
  render();
  showToast('群组已解散');
}

function doSaveMy() {
  var u = me();
  var newName = $('#myName').value.trim();
  var newPwd = $('#myPwd').value;
  if (!newName || newName.length < 2) { showToast('账号至少 2 字符'); return; }
  if (newName !== u.name && store.users.find(function(x) { return x.name === newName; })) { showToast('该账号已被占用'); return; }
  u.name = newName;
  if (newPwd) {
    if (newPwd.length < 4) { showToast('密码至少 4 位'); return; }
    u.password = newPwd;
  }
  saveStore();
  state.showAccountModal = false;
  render();
  showToast('账号信息已更新');
}

function doSaveAdmin() {
  var admin = userById(SYSTEM_ADMIN_ID);
  var newName = $('#adminName').value.trim();
  var newPwd = $('#adminPwd').value;
  if (!newName || newName.length < 2) { showToast('账号至少 2 字符'); return; }
  if (newName !== admin.name && store.users.find(function(x) { return x.name === newName; })) { showToast('该账号已被占用'); return; }
  if (!newPwd || newPwd.length < 4) { showToast('密码至少 4 位，请填写'); return; }
  admin.name = newName;
  admin.password = newPwd;

function doSend() {
  var input = $('#msgInput');
  if (!input) return;
  var text = input.value.trim();
  // 支持图片/位置消息
  if (state._pendingLocation) text = state._pendingLocation;
  else if (state._pendingImage) text = state._pendingImage;
  if (!text) return;
  var msg = { id: genId('msg'), from: store.currentUserId, text: text, time: now(), timestamp: Date.now(), read: false };
  if (state._pendingCaption) msg.caption = state._pendingCaption;
  // 群消息审核：非管理员/白名单发的群消息进入审核队列
  if (state.activeChat.type === 'group') {
    var g = groupById(state.activeChat.id);
    if (!g) return;
    msg.to = g.id;
    var r = me();
    if (r && r.role !== 'admin' && r.role !== 'whitelist') {
      msg.reviewStatus = 'pending';
      if (!store.groupMsgReviews) store.groupMsgReviews = [];
      store.groupMsgReviews.push({
        id: msg.id, groupId: g.id, from: msg.from, text: msg.text, time: msg.time, status: 'pending'
      });
      g.msgs.push(msg);
    } else {
      g.msgs.push(msg);
    }
  } else {
    msg.type = 'user'; msg.to = state.activeChat.id;
    store.messages.push(msg);
  }
  saveStore();
  state.draft = '';
  state._pendingLocation = null;
  state._pendingImage = null;
  state._pendingCaption = null;
  render();
}

function render() {
  var app = $('#app');
  if (state.view === 'login') { app.innerHTML = renderAuth(); }
  else { app.innerHTML = renderMain(); }
  bind();
  // 更新语音遮罩
  var vw = document.getElementById('voiceOverlayWrap');
  if (vw) vw.innerHTML = (typeof renderVoiceOverlay === 'function') ? renderVoiceOverlay() : '';
}

function renderGroupReviewPanel() {
  if (state.activeChat.type !== 'group') return '';

      var savatar = sender ? sender.avatar : '\u{1F464}';

          '<div style="font-size:13px;font-weight:600;margin-bottom:4px">\uD83D\uDCC1 \u4F4D\u7F6E\u5206\u4EAB</div>' +

          '<div style="font-size:11px;color:var(--blue);margin-top:6px">\u70B9\u51FB\u6253\u5F00\u5730\u56FE \u203A</div>' +

// 4. 截图按钮
function handleShot() {
  if (window.__h2cCDNFail || typeof html2canvas === 'undefined') {
    showToast('html2canvas 加载失败，无法截图');
    return;
  }
  showToast('正在截图…');
  // 微信风格：先截 #app 区域 → 立刻弹出区域选择遮罩 → 选完直接进标注弹窗
  // 用 Promise.race 加 8 秒超时，避免 html2canvas 卡死永不 reject
  var timeoutPromise = new Promise(function(_, reject) {
    setTimeout(function() { reject(new Error('截图超时（8秒）')); }, 8000);
  });
  setTimeout(function() {
    var appEl = document.getElementById('app');
    if (!appEl) appEl = document.body;
    var finishPromise = html2canvas(appEl, {
      backgroundColor: '#1a1a2e',
      logging: false,
      useCORS: false,
      scale: Math.min(window.devicePixelRatio || 1, 2),
      onclone: function(clonedDoc) {
        // 隐藏截图遮罩本身，避免截到自己的 UI
        var masks = clonedDoc.querySelectorAll('.modal-bg, .shot-region-bg');
        for (var i = 0; i < masks.length; i++) masks[i].style.display = 'none';
      }
    });
    Promise.race([finishPromise, timeoutPromise]).then(function(canvas) {
      // 截完后存入内存，等待用户在区域选择遮罩上选区
      state._shotFullCanvas = canvas;
      state._shotFullWidth = canvas.width;
      state._shotFullHeight = canvas.height;
      state._shotFullDataUrl = canvas.toDataURL('image/png');
      // 弹出区域选择遮罩
      state.showShotRegion = true;
      state._shotRegion = null;
      render();
      // 初始化区域选择
      setTimeout(initShotRegionSelector, 60);
    }).catch(function(e) {
      console.error('截图失败', e);
      showToast('截图失败：' + (e.message || e));
    });
  }, 100);
}

// 微信风格区域选择遮罩
function initShotRegionSelector() {
  var mask = $('#shotRegionMask');
  var img = $('#shotRegionImg');
  var box = $('#shotRegionSel');
  if (!mask || !img || !box) return;
  // 加载截图到背景
  img.src = state._shotFullDataUrl;
  // 按视口缩放展示（保持比例）
  var vw = window.innerWidth, vh = window.innerHeight;
  var scale = Math.min((vw - 40) / state._shotFullWidth, (vh - 120) / state._shotFullHeight, 1);
  var dispW = Math.round(state._shotFullWidth * scale);
  var dispH = Math.round(state._shotFullHeight * scale);
  img.style.width = dispW + 'px';
  img.style.height = dispH + 'px';
  state._shotRegionScale = scale;
  state._shotRegionDispW = dispW;
  state._shotRegionDispH = dispH;
  // 选区状态
  var drawing = false, sx = 0, sy = 0;
  function startDraw(e) {
    e.preventDefault();
    e.stopPropagation();
    var rect = img.getBoundingClientRect();
    var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    var y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    x = Math.max(0, Math.min(x, dispW));
    y = Math.max(0, Math.min(y, dispH));
    sx = x; sy = y;
    drawing = true;
    box.style.left = x + 'px';
    box.style.top = y + 'px';
    box.style.width = '0px';
    box.style.height = '0px';
    box.style.display = 'block';
    state._shotRegion = { x: x, y: y, w: 0, h: 0 };
    updateHint(x, y, 0, 0);
  }
  function moveDraw(e) {
    if (!drawing) return;
    e.preventDefault();
    e.stopPropagation();
    var rect = img.getBoundingClientRect();
    var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    var y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    x = Math.max(0, Math.min(x, dispW));
    y = Math.max(0, Math.min(y, dispH));
    var lx = Math.min(sx, x), ly = Math.min(sy, y);
    var w = Math.abs(x - sx), h = Math.abs(y - sy);
    box.style.left = lx + 'px';
    box.style.top = ly + 'px';
    box.style.width = w + 'px';
    box.style.height = h + 'px';
    state._shotRegion = { x: lx, y: ly, w: w, h: h };
    updateHint(lx, ly, w, h);
  }
  function endDraw(e) {
    if (e && e.stopPropagation) e.stopPropagation();
    drawing = false;
    // 微信风格：松手即确认
    if (state._shotRegion && state._shotRegion.w >= 4 && state._shotRegion.h >= 4) {
      confirmShotRegion();
    }
  }
  function updateHint(x, y, w, h) {
    var hint = $('#shotRegionHint');
    if (!hint) return;
    // 选区原图尺寸（按 _shotRegionScale 还原）
    var realW = Math.round(w / state._shotRegionScale);
    var realH = Math.round(h / state._shotRegionScale);
    hint.textContent = w < 4 || h < 4 ? '拖选区域（松手即标注，Esc 取消）' :
      '选区: ' + realW + ' × ' + realH + ' px（松手自动开始标注）';
  }
  // 鼠标 + 触摸都支持（绑 img 上最稳；mask 是 display:none 收不到鼠标事件）
  img.onmousedown = startDraw;
  img.onmousemove = moveDraw;
  img.onmouseup = endDraw;
  img.ontouchstart = startDraw;
  img.ontouchmove = moveDraw;
  img.ontouchend = endDraw;
  // 取消按钮：直接 ID 绑
  var btnCancel = document.getElementById('btnCancelShotRegion');
  if (btnCancel) btnCancel.onclick = function(ev) { ev.stopPropagation(); cancelShotRegion(); };
}

// 确认选区 → 裁出图片 → 进标注弹窗
function confirmShotRegion() {
  var r = state._shotRegion;
  if (!r || r.w < 4 || r.h < 4) {
    showToast('请先按住鼠标拖选一块区域');
    return;
  }
  var scale = state._shotRegionScale;
  // 按真实像素裁剪
  var sx = Math.round(r.x / scale);
  var sy = Math.round(r.y / scale);
  var sw = Math.round(r.w / scale);
  var sh = Math.round(r.h / scale);
  var src = state._shotFullCanvas;
  var out = document.createElement('canvas');
  out.width = sw; out.height = sh;
  out.getContext('2d').drawImage(src, sx, sy, sw, sh, 0, 0, sw, sh);
  // 截图区原图超过 2000px 等比缩放（避免大屏幕截图 base64 爆炸）
  var MAX_SHOT = 2000;
  if (sw > MAX_SHOT || sh > MAX_SHOT) {
    var sc = MAX_SHOT / Math.max(sw, sh);
    var rw = Math.round(sw * sc), rh = Math.round(sh * sc);
    var rc = document.createElement('canvas');
    rc.width = rw; rc.height = rh;
    rc.getContext('2d').drawImage(out, 0, 0, rw, rh);
    state.shotSrc = rc.toDataURL('image/png');
  } else {
    state.shotSrc = out.toDataURL('image/png');
  }
  state._shotFromLib = false;
  state.shotCropRect = { x: sx, y: sy, w: sw, h: sh };
  // 关闭区域选择遮罩，进标注弹窗
  state.showShotRegion = false;
  state._shotFullCanvas = null;
  state._shotFullDataUrl = null;
  state.showShotEditor = true;
  render();
}

function cancelShotRegion() {
  state.showShotRegion = false;
  state._shotRegion = null;
  state._shotFullCanvas = null;
  state._shotFullDataUrl = null;
  render();
}

// ===== 自定义相机（替代系统相机，去掉 ×/✓ 确认页）=====
var _camStream = null;      // 当前媒体流
var _camFacing = 'environment'; // 'environment' 后置 | 'user' 前置
var _camPhotoData = '';    // 拍照后的 base64 数据
var _camVideo = null;        // video 元素引用
var _camCanvas = null;       // 隐藏 canvas 用于截图

function showCustomCamera() {
  var overlay = document.getElementById('customCamera');
  var video = document.getElementById('cameraVideo');
  var errEl = document.getElementById('cameraError');
  if (errEl) { errEl.textContent = ''; errEl.classList.remove('show'); }
  if (!overlay || !video) { showToast('相机 UI 初始化失败'); return; }
  _camVideo = video;
  // 启动摄像头
  var constraints = {
    video: { facingMode: _camFacing, width: { ideal: 1920 }, height: { ideal: 1080 } },
    audio: false
  };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      _camStream = stream;
      video.srcObject = stream;
      video.play();
      overlay.classList.add('active');
      // 检测闪光灯支持
      var track = stream.getVideoTracks()[0];
      var flashBtn = document.getElementById('camFlashBtn');
      if (flashBtn && track && track.getCapabilities && track.getCapabilities().torch !== undefined) {
        flashBtn.style.display = '';
      }
    })
    .catch(function(err) {
      console.error('[自定义相机] 启动失败:', err);
      if (errEl) {
        errEl.textContent = '⚠ 无法启动相机：' + (err.message || '权限被拒绝') + '\n请允许浏览器访问摄像头';
        errEl.classList.add('show');
      }
      // 降级： fall back 到系统相机
      setTimeout(function() {
        var cp = document.getElementById('cameraPicker');
        if (cp) cp.click();
      }, 1500);
    });
}

function closeCustomCamera() {
  var overlay = document.getElementById('customCamera');
  var video = document.getElementById('cameraVideo');
  var preview = document.getElementById('cameraPhotoPreview');
  var reviewBar = document.getElementById('cameraReviewBar');
  if (overlay) overlay.classList.remove('active');
  // 停止媒体流
  if (_camStream) {
    _camStream.getTracks().forEach(function(t) { t.stop(); });
    _camStream = null;
  }
  if (video) { video.srcObject = null; video.style.display = ''; }
  if (preview) { preview.style.display = 'none'; preview.src = ''; }
  if (reviewBar) { reviewBar.classList.remove('show'); reviewBar.style.display = 'none'; }
  _camPhotoData = '';
}

function takeCustomPhoto() {
  var video = _camVideo || document.getElementById('cameraVideo');
  if (!video || video.videoWidth === 0) { showToast('相机未就绪'); return; }
  // 用 canvas 截取当前视频帧
  var c = document.getElementById('cameraCanvas');
  if (!c) {
    c = document.createElement('canvas');
    c.id = 'cameraCanvas';
    c.style.display = 'none';
    document.body.appendChild(c);
  }
  _camCanvas = c;
  c.width = video.videoWidth;
  c.height = video.videoHeight;
  var ctx = c.getContext('2d');
  // 前置摄像头需要镜像
  if (_camFacing === 'user') {
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, -c.width, 0, c.width, c.height);
    ctx.restore();
  } else {
    ctx.drawImage(video, 0, 0, c.width, c.height);
  }
  // 获取图片数据
  var dataUrl = c.toDataURL('image/jpeg', 0.92);
  _camPhotoData = dataUrl;
  // 显示预览图
  var preview = document.getElementById('cameraPhotoPreview');
  if (preview) {
    preview.src = dataUrl;
    preview.style.display = 'block';
  }
  // 显示操作栏（用 style 直接覆盖内联 display:none）
  var reviewBar = document.getElementById('cameraReviewBar');
  if (reviewBar) { reviewBar.classList.add('show'); reviewBar.style.display = 'flex'; }
  // 隐藏 video
  if (video) video.style.display = 'none';
}

function retryCustomPhoto() {
  var preview = document.getElementById('cameraPhotoPreview');
  var reviewBar = document.getElementById('cameraReviewBar');
  var video = _camVideo || document.getElementById('cameraVideo');
  if (preview) { preview.style.display = 'none'; preview.src = ''; }
  if (reviewBar) { reviewBar.classList.remove('show'); reviewBar.style.display = 'none'; }
  if (video) video.style.display = '';
  _camPhotoData = '';
}

function confirmCustomPhoto() {
  if (!_camPhotoData) { showToast('请先拍照'); return; }
  compressImage(_camPhotoData, 1280, function(compressed) {
    closeCustomCamera();
    state._cameraPhoto = compressed;
    state.showCameraPreview = true;
    render();
  });
}
function editCustomPhoto() {
  if (!_camPhotoData) { showToast('请先拍照'); return; }
  compressImage(_camPhotoData, 1280, function(compressed) {
    closeCustomCamera();
    state._shotSrc = compressed;
    state._shotFromLib = true;
    state.showShotEditor = true;
    render();
    setTimeout(function() {
      if (typeof initFabricCanvas === 'function') initFabricCanvas();
    }, 100);
  });
}

function switchCamera() {
  _camFacing = _camFacing === 'environment' ? 'user' : 'environment';
  // 重启摄像头
  if (_camStream) {
    _camStream.getTracks().forEach(function(t) { t.stop(); });
    _camStream = null;
  }
  var video = _camVideo || document.getElementById('cameraVideo');
  if (video) video.srcObject = null;
  showCustomCamera();
}

function toggleFlash() {
  if (!_camStream) return;
  var track = _camStream.getVideoTracks()[0];
  if (!track || !track.getCapabilities) return;
  var caps = track.getCapabilities();
  if (caps.torch === undefined) { showToast('当前设备不支持闪光灯'); return; }
  var settings = track.getSettings();
  var on = !settings.torch;
  track.applyConstraints({ advanced: [{ torch: on }] })
    .then(function() {
      var btn = document.getElementById('camFlashBtn');
      if (btn) btn.textContent = on ? '🔦' : '⚡';
      var st = document.getElementById('camFlashStatus');
      if (st) st.textContent = on ? '闪光灯：开' : '闪光灯：关';
    })
    .catch(function() { showToast('闪光灯切换失败'); });
}

function handleFileSelected(e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { showToast('图片不能超过 10MB'); e.target.value = ''; return; }
  var reader = new FileReader();
  reader.onload = function(ev) {
    compressImage(ev.target.result, 1280, function(compressed) {

// 压缩图片：等比缩放，体积超阈值转 jpeg
function compressImage(dataUrl, maxSide, cb) {
  var img = new Image();
  img.onload = function() {
    var w = img.naturalWidth, h = img.naturalHeight;
    var scale = Math.min(maxSide / Math.max(w, h), 1);
    var cw = Math.max(1, Math.round(w * scale));
    var ch = Math.max(1, Math.round(h * scale));
    var c = document.createElement('canvas');
    c.width = cw; c.height = ch;
    c.getContext('2d').drawImage(img, 0, 0, cw, ch);
    // 先试 png，超过 800KB 就 jpeg 0.82
    var out = c.toDataURL('image/png');
    if (out.length > 800 * 1024) {
      out = c.toDataURL('image/jpeg', 0.82);
    }
    cb(out);
  };
  img.onerror = function() { cb(dataUrl); };
  img.src = dataUrl;
}

// 6. 裁剪相关
var cropState = { drawing: false, sx: 0, sy: 0, ex: 0, ey: 0, rect: null };

function initCropUI() {
  var mask = $('#cropMask');
  var img = $('#cropImg');
  if (!mask || !img) return;
  mask.innerHTML = '';
  var rect = document.createElement('div');
  rect.className = 'crop-rect';
  rect.style.display = 'none';
  ['nw', 'ne', 'sw', 'se'].forEach(function(p) {
    var h = document.createElement('div');
    h.className = 'crop-rect-handle ' + p;
    h.dataset.handle = p;
    rect.appendChild(h);
  });
  var size = document.createElement('div');
  size.className = 'crop-size';
  size.style.display = 'none';
  rect.appendChild(size);
  mask.appendChild(rect);
  cropState.rect = rect;
  cropState.sizeLabel = size;

  function getPos(e) {
    var r = img.getBoundingClientRect();
    return { x: Math.max(0, Math.min(r.width, e.clientX - r.left)), y: Math.max(0, Math.min(r.height, e.clientY - r.top)), sx: r.width, sy: r.height, ox: r.left, oy: r.top };
  }
  function draw(x1, y1, x2, y2) {
    var x = Math.min(x1, x2), y = Math.min(y1, y2);
    var w = Math.abs(x2 - x1), h = Math.abs(y2 - y1);
    rect.style.left = x + 'px';
    rect.style.top = y + 'px';
    rect.style.width = w + 'px';
    rect.style.height = h + 'px';
    rect.style.display = 'block';
    // 缩放到原图
    var scaleX = img.naturalWidth / r.width || 1;
    var scaleY = img.naturalHeight / r.height || 1;
    size.style.left = (x + w/2) + 'px';
    size.style.top = y + 'px';
    size.textContent = Math.round(w*scaleX) + ' × ' + Math.round(h*scaleY);
    size.style.display = 'block';
  }
  var r;
  mask.addEventListener('mousedown', function(e) {
    r = getPos(e);
    cropState.drawing = true;
    cropState.sx = r.x; cropState.sy = r.y;
    draw(r.x, r.y, r.x, r.y);
    e.preventDefault();
  });
  mask.addEventListener('mousemove', function(e) {
    if (!cropState.drawing) return;
    var p = getPos(e);
    draw(cropState.sx, cropState.sy, p.x, p.y);
  });
  mask.addEventListener('mouseup', function(e) {
    if (!cropState.drawing) return;
    var p = getPos(e);
    cropState.drawing = false;
    var x = Math.min(cropState.sx, p.x), y = Math.min(cropState.sy, p.y);
    var w = Math.abs(p.x - cropState.sx), h = Math.abs(p.y - cropState.sy);
    if (w < 10 || h < 10) {
      // 太小就当全图
      var imgRect = img.getBoundingClientRect();
      x = 0; y = 0; w = imgRect.width; h = imgRect.height;
    }
    var scaleX = img.naturalWidth / img.getBoundingClientRect().width;
    var scaleY = img.naturalHeight / img.getBoundingClientRect().height;
    state.shotCropRect = { x: x*scaleX, y: y*scaleY, w: w*scaleX, h: h*scaleY };
    draw(cropState.sx, cropState.sy, p.x, p.y);
  });
}

function applyCropAndOpenEditor() {
  var img = $('#cropImg');
  if (!img) { showToast('请先截图'); return; }
  if (!state.shotCropRect) {
    // 没选区就用全图
    state.shotCropRect = { x: 0, y: 0, w: img.naturalWidth, h: img.naturalHeight };
  }
  // 裁剪原图
  var canvas = document.createElement('canvas');
  canvas.width = Math.round(state.shotCropRect.w);
  canvas.height = Math.round(state.shotCropRect.h);
  var ctx = canvas.getContext('2d');
  ctx.drawImage(img, state.shotCropRect.x, state.shotCropRect.y, state.shotCropRect.w, state.shotCropRect.h, 0, 0, canvas.width, canvas.height);
  state.shotSrc = canvas.toDataURL('image/png');
  state.showShotEditor = true;
  state._shotFromLib = false;
  render();
  setTimeout(initFabricCanvas, 50);
}

// 更新画布状态指示器
function setCanvasStatus(text, color) {
  var el = document.getElementById('canvasStatus');

    el.textContent = text;

    el.style.display = 'block';
