// 标注工具激活辅助函数（供 actionHandlers 直接调用）
function toolActivate(tool) {
  if (state._fabricCanvas && typeof window.setShotTool === 'function') {
    window.setShotTool(tool);
    return;
  }
  // 画布未就绪，尝试重新初始化
  setCanvasStatus('⏳ 正在准备画布...', '#fdcb6e');
  initFabricCanvas();
  // 1 秒后重试一次
  var retry = function() {
    if (state._fabricCanvas && typeof window.setShotTool === 'function') {
      window.setShotTool(tool);
    } else {
      showToast('画布加载中...请稍候');
    }
  };
  setTimeout(retry, 1000);
}

// 7. fabric.js 画布
function initFabricCanvas() {
  var stage = $('#shotStage');
  if (!stage) {
    setCanvasStatus('✕ #shotStage 不存在', '#ff7675');
    console.warn('[initFabricCanvas] #shotStage 不存在');
    return;
  }
  if (typeof fabric === 'undefined') {
    setCanvasStatus('✕ fabric.js 未加载', '#ff7675');
    showToast('fabric.js 未加载，标注功能不可用');
    bindShotTools(null);
    return;
  }
  setCanvasStatus('⏳ 等待布局完成...', '#fdcb6e');
  // 等 modal 真正 layout 完（clientWidth > 0）
  if (!stage.clientWidth) {
    var tries = 0;
    var waitForLayout = function() {
      tries++;
      if (stage.clientWidth > 0 || tries > 20) {
        doInitFabric();
      } else {
        setTimeout(waitForLayout, 30);
      }
    };
    waitForLayout();
    return;
  }
  doInitFabric();

  function doInitFabric() {
    if (!state.shotSrc) {
      setCanvasStatus('✕ 没有图片源', '#ff7675');
      return;
    }
    setCanvasStatus('⏳ 加载图片...', '#fdcb6e');
    var imgEl = new Image();
    imgEl.onload = function() {
      setCanvasStatus('⏳ 创建画布...', '#fdcb6e');
      var stageW = Math.max(320, stage.clientWidth - 20);
      var maxH = Math.max(240, window.innerHeight * 0.6);
      var scale = Math.min(stageW / imgEl.width, maxH / imgEl.height, 1);
      var cw = Math.max(10, Math.round(imgEl.width * scale));
      var ch = Math.max(10, Math.round(imgEl.height * scale));
      var canvas = new fabric.Canvas('shotCanvas', {
        width: cw, height: ch,
        backgroundImage: new fabric.Image(imgEl, { scaleX: scale, scaleY: scale }),
        selection: false
      });
      state._fabricCanvas = canvas;
      state._shotHistory = [];
      state._shotHistoryIndex = -1;
      pushHistory();
      bindShotTool(canvas, scale);
      bindShotTools(canvas);
      setCanvasStatus('✅ 画布就绪', '#00cec9');
    };
    imgEl.onerror = function() {
      setCanvasStatus('✕ 图片加载失败', '#ff7675');
      showToast('图片加载失败');
      bindShotTools(null);
    };
    imgEl.src = state.shotSrc;
  }
}


// 标注工具栏按钮绑定（唯一来源：canvas 就绪后调用）
// 注意：shot-tool-* / shot-undo / redo / clear 不走 actionHandlers 通用循环，
// 因为那些工具依赖 state._fabricCanvas，而通用循环运行时 canvas 可能还没初始化。
function bindShotTools(canvas) {
  var fabricOk = typeof fabric !== 'undefined';
  var canvasOk = canvas && typeof canvas === 'object';

  // === 绘图工具按钮（rect/ellipse/arrow/pen/text/mosaic）===
  var toolMap = {
    'shot-tool-rect': 'rect',
    'shot-tool-ellipse': 'ellipse',
    'shot-tool-arrow': 'arrow',
    'shot-tool-pen': 'pen',
    'shot-tool-text': 'text',
    'shot-tool-mosaic': 'mosaic'
  };
  Object.keys(toolMap).forEach(function(act) {
    var b = document.querySelector('[data-act="' + act + '"]');
    if (!b) return;
    if (!fabricOk || !canvasOk) {
      // canvas 未就绪时禁用并给提示
      b.onclick = function(e) { e.stopPropagation(); showToast('画布加载中...请稍候'); };
      b.style.opacity = '0.4';
      b.style.cursor = 'not-allowed';
      return;
    }
    // 正常绑定
    b.style.opacity = '';
    b.style.cursor = '';
    b.onclick = function(e) {
      e.stopPropagation();
      activateShotTool(b, toolMap[act]);
    };
  });

  // === 撤销 / 重做 / 清空 ===
  var btnUndo = document.querySelector('[data-act="shot-undo"]');
  if (btnUndo) btnUndo.onclick = function(e) { e.stopPropagation(); shotUndo(); };
  var btnRedo = document.querySelector('[data-act="shot-redo"]');
  if (btnRedo) btnRedo.onclick = function(e) { e.stopPropagation(); shotRedo(); };
  var btnClear = document.querySelector('[data-act="shot-clear"]');
  if (btnClear) btnClear.onclick = function(e) { e.stopPropagation(); shotClear(); };

  // === 颜色选择器 ===
  var colorEl = document.getElementById('shotColor');
  if (colorEl) colorEl.oninput = function(e) {
    state._shotColor = e.target.value;
    if (canvasOk && canvas.freeDrawingBrush) {
      canvas.freeDrawingBrush.color = state._shotColor;
    }
  };

  // === 发送 / 取消（顶部导航栏按钮）===
  var btnSend = document.getElementById('btnSendShot');
  if (btnSend) btnSend.onclick = function(e) { e.stopPropagation(); shotSend(); };
  var btnCancel = document.getElementById('btnCancelShot');
  if (btnCancel) btnCancel.onclick = function(e) { e.stopPropagation(); state._pendingCaption = null; state.showShotEditor = false; render(); };

  console.log('[bindShotTools] 工具栏绑定完成, fabric=' + fabricOk + ' canvas=' + canvasOk);
}

function bindShotTool(canvas, scale) {
  var isDown = false, startX, startY, activeObj = null;
  state._shotTool = null;
  canvas._activeTool = null;

  // 兼容旧调用：window.setShotTool 直接更新 canvas._activeTool
  window.setShotTool = function(t) {
    canvas._activeTool = t;
    state._shotTool = t;
    canvas.isDrawingMode = false;
    canvas.selection = false;
    canvas.defaultCursor = t ? 'crosshair' : 'default';
    canvas.forEachObject(function(o) { o.selectable = false; o.evented = false; });
    // 高亮按钮（用 data-act 选择）
    document.querySelectorAll('.shot-tool').forEach(function(b) {
      var act = b.dataset.act || '';
      var isThis = false;
      if (t === 'rect') isThis = act === 'shot-tool-rect';
      else if (t === 'ellipse') isThis = act === 'shot-tool-ellipse';
      else if (t === 'arrow') isThis = act === 'shot-tool-arrow';
      else if (t === 'pen') isThis = act === 'shot-tool-pen';
      else if (t === 'text') isThis = act === 'shot-tool-text';
      else if (t === 'mosaic') isThis = act === 'shot-tool-mosaic';
      b.classList.toggle('active', isThis);
    });
    if (t === 'pen') {
      canvas.isDrawingMode = true;
      if (canvas.freeDrawingBrush) {
        canvas.freeDrawingBrush.color = state._shotColor;
        canvas.freeDrawingBrush.width = 3;
      }
    }
  };

  // 事件监听器从 canvas._activeTool 读工具值（不依赖闭包变量）
  canvas.on('mouse:down', function(opt) {
    var tool = canvas._activeTool;
    if (!tool) return;
    if (tool === 'pen') return; // freeDrawingMode 自己处理
    isDown = true;
    var p = canvas.getPointer(opt.e);
    startX = p.x; startY = p.y;
    var color = state._shotColor;
    if (tool === 'text') {
      var txt = prompt('请输入文字：');
      if (txt) {
        var t = new fabric.IText(txt, {
          left: p.x, top: p.y, fontSize: 20, fill: color,
          fontFamily: 'sans-serif', fontWeight: 'bold'
        });
        canvas.add(t);
        pushHistory();
      }
      isDown = false;
      return;
    }
    if (tool === 'mosaic') {
      // 马赛克：先用一个不可见矩形做选区
      activeObj = new fabric.Rect({
        left: p.x, top: p.y, width: 1, height: 1,
        fill: 'transparent', stroke: 'rgba(255,255,255,0.5)', strokeDashArray: [5, 5],
        selectable: false, evented: false, _mosaicTmp: true
      });
      canvas.add(activeObj);
      return;
    }
    // rect / ellipse / arrow 预览
    var opts = {
      left: p.x, top: p.y, width: 1, height: 1,
      fill: 'transparent', stroke: color, strokeWidth: 3,
      selectable: false, evented: false
    };
    if (tool === 'rect') activeObj = new fabric.Rect(opts);
    else if (tool === 'ellipse') activeObj = new fabric.Ellipse(opts);
    else if (tool === 'arrow') {
      activeObj = new fabric.Group([new fabric.Line([0, 0, 1, 1], { stroke: color, strokeWidth: 3 })], { left: p.x, top: p.y, selectable: false });
    }
    if (activeObj) canvas.add(activeObj);
  });

  canvas.on('mouse:move', function(opt) {
    if (!isDown || !activeObj) return;
    var tool = canvas._activeTool;
    var p = canvas.getPointer(opt.e);
    var w = p.x - startX, h = p.y - startY;
    if (tool === 'rect' || tool === 'mosaic') {
      activeObj.set({ width: Math.abs(w), height: Math.abs(h), left: Math.min(startX, p.x), top: Math.min(startY, p.y) });
    } else if (tool === 'ellipse') {
      activeObj.set({ rx: Math.abs(w)/2, ry: Math.abs(h)/2, left: Math.min(startX, p.x), top: Math.min(startY, p.y), width: Math.abs(w), height: Math.abs(h) });
    } else if (tool === 'arrow') {
      canvas.remove(activeObj);
      var color = state._shotColor;
      var x1 = startX, y1 = startY, x2 = p.x, y2 = p.y;
      var angle = Math.atan2(y2 - y1, x2 - x1);
      var headLen = 14;
      var pts = [
        { x: x1, y: y1 },
        { x: x2, y: y2 },
        { x: x2 - headLen * Math.cos(angle - Math.PI/6), y: y2 - headLen * Math.sin(angle - Math.PI/6) },
        { x: x2, y: y2 },
        { x: x2 - headLen * Math.cos(angle + Math.PI/6), y: y2 - headLen * Math.sin(angle + Math.PI/6) }
      ];
      var pathStr = 'M ' + pts.map(function(p){return p.x+' '+p.y;}).join(' L ');
      activeObj = new fabric.Path(pathStr, { stroke: color, strokeWidth: 3, fill: '', selectable: false, evented: false });
      canvas.add(activeObj);
    }
    canvas.renderAll();
  });

  canvas.on('mouse:up', function(opt) {
    var tool = canvas._activeTool;
    if (!isDown) return;
    isDown = false;
    if (tool === 'mosaic' && activeObj) {
      var left = activeObj.left, top = activeObj.top, w = activeObj.width, h = activeObj.height;
      canvas.remove(activeObj);
      activeObj = null;
      if (w < 5 || h < 5) return;
      // 应用马赛克
      applyMosaic(canvas, left, top, w, h);
      pushHistory();
      return;
    }
    if (activeObj) {
      if (activeObj.width < 4 || activeObj.height < 4) { canvas.remove(activeObj); activeObj = null; return; }
      activeObj.set({ selectable: true, evented: true });
      canvas.setActiveObject(activeObj);
      pushHistory();
      activeObj = null;
    }
  });
}

// 8. 马赛克应用
function applyMosaic(canvas, left, top, w, h) {
  var mode = state._shotMosaicMode;
  if (mode === 'block') {
    // 黑色色块
    var r = new fabric.Rect({
      left: left, top: top, width: w, height: h,
      fill: 'rgba(0,0,0,0.85)', stroke: 'rgba(255,255,255,0.3)', strokeWidth: 1,
      selectable: true, evented: true
    });
    canvas.add(r);
    canvas.setActiveObject(r);
  } else {
    // 像素化：从背景图采样
    var bg = canvas.backgroundImage;
    if (!bg) return;
    var blockSize = 8; // 像素块大小
    var cols = Math.ceil(w / blockSize), rows = Math.ceil(h / blockSize);
    var group = [];
    for (var i = 0; i < cols; i++) {
      for (var j = 0; j < rows; j++) {
        var cx = left + i*blockSize + blockSize/2;
        var cy = top + j*blockSize + blockSize/2;
        // 取这个块中心点的颜色（用 fabric.util 取不到，直接用平均灰度简化）
        var lum = 128; // 默认灰
        // 这里简化为随机灰度马赛克（视觉效果）
        lum = Math.floor(Math.random() * 80 + 100);
        var rect = new fabric.Rect({
          left: left + i*blockSize, top: top + j*blockSize,
          width: blockSize, height: blockSize,
          fill: 'rgb(' + lum + ',' + lum + ',' + lum + ')',
          stroke: 'rgba(255,255,255,0.05)', strokeWidth: 0.5,
          selectable: false, evented: false, _mosaicPiece: true
        });
        group.push(rect);
      }
    }
    var grp = new fabric.Group(group, {
      left: left, top: top,
      selectable: true, evented: true
    });
    canvas.add(grp);
  }
  canvas.renderAll();
}

// 9. 撤销/重做
// 工具按钮统一入口（data-act 触发）
// 不依赖 window.setShotTool 闭包，直接操作 state._fabricCanvas
function activateShotTool(el, tool) {
  if (typeof fabric === 'undefined') {
    showToast('fabric.js 还没加载好，请稍候再点');
    return;
  }
  var canvas = state._fabricCanvas;
  if (!canvas) {
    showToast('画布还在初始化，请稍等');
    return;
  }
  // 直接设置工具，不依赖闭包
  state._shotTool = tool;
  canvas.isDrawingMode = false;
  canvas.selection = false;
  canvas.defaultCursor = tool ? 'crosshair' : 'default';
  // 高亮对应按钮（用 data-act 选择，不依赖 data-tool）
  document.querySelectorAll('.shot-tool').forEach(function(b) {
    var act = b.dataset.act || '';
    var isThis = false;
    if (tool === 'rect') isThis = act === 'shot-tool-rect';
    else if (tool === 'ellipse') isThis = act === 'shot-tool-ellipse';
    else if (tool === 'arrow') isThis = act === 'shot-tool-arrow';
    else if (tool === 'pen') isThis = act === 'shot-tool-pen';
    else if (tool === 'text') isThis = act === 'shot-tool-text';
    else if (tool === 'mosaic') isThis = act === 'shot-tool-mosaic';
    b.classList.toggle('active', isThis);
  });
  if (tool === 'pen') {
    canvas.isDrawingMode = true;
    if (canvas.freeDrawingBrush) {
      canvas.freeDrawingBrush.color = state._shotColor;
      canvas.freeDrawingBrush.width = 3;
    }
  }
  // 确保事件监听器用的是最新的 tool 值
  // 把 tool 存到 canvas 上，事件监听器从 canvas._activeTool 读
  canvas._activeTool = tool;
}

function pushHistory() {
  var canvas = state._fabricCanvas;
  if (!canvas) return;
  // 截断 redo 分支
  state._shotHistory = state._shotHistory.slice(0, state._shotHistoryIndex + 1);
  state._shotHistory.push(JSON.stringify(canvas.toJSON()));
  state._shotHistoryIndex++;
  if (state._shotHistory.length > 30) {
    state._shotHistory.shift();
    state._shotHistoryIndex--;
  }
}

function shotUndo() {
  var canvas = state._fabricCanvas;
  if (!canvas || state._shotHistoryIndex <= 0) return;
  state._shotHistoryIndex--;
  canvas.loadFromJSON(state._shotHistory[state._shotHistoryIndex], function() { canvas.renderAll(); });
}

function shotRedo() {
  var canvas = state._fabricCanvas;
  if (!canvas || state._shotHistoryIndex >= state._shotHistory.length - 1) return;
  state._shotHistoryIndex++;
  canvas.loadFromJSON(state._shotHistory[state._shotHistoryIndex], function() { canvas.renderAll(); });
}

function shotClear() {
  var canvas = state._fabricCanvas;
  if (!canvas) return;
  if (!confirm('清空所有标注？')) return;
  // 重建一个只含背景的画布
  var bgImg = canvas.backgroundImage;
  canvas.clear();
  canvas.setBackgroundImage(bgImg, canvas.renderAll.bind(canvas));
  pushHistory();
}

function shotRotate(deg) {
  var canvas = state._fabricCanvas;
  if (!canvas) return;
  var bgImg = canvas.backgroundImage;
  if (!bgImg) return;
  // 旋转背景图：先导出 → 旋转 → 重新设为背景
  var orig = bgImg.getElement();
  var rc = document.createElement('canvas');
  var rad = deg * Math.PI / 180;
  var sin = Math.abs(Math.sin(rad)), cos = Math.abs(Math.cos(rad));
  rc.width = Math.round(orig.naturalHeight * sin + orig.naturalWidth * cos);
  rc.height = Math.round(orig.naturalWidth * sin + orig.naturalHeight * cos);
  var ctx = rc.getContext('2d');
  ctx.translate(rc.width / 2, rc.height / 2);
  ctx.rotate(rad);
  ctx.drawImage(orig, -orig.naturalWidth / 2, -orig.naturalHeight / 2);
  fabric.Image.fromURL(rc.toDataURL(), function(img) {
    img.set({ scaleX: canvas.width / rc.width, scaleY: canvas.height / rc.height });
    canvas.setBackgroundImage(img, function() {
      canvas.renderAll();
      pushHistory();
    });
  });
}

// 10. 编辑器内裁剪：把当前 fabric 画布内容导出，进区域选择遮罩重新裁剪
function cropFromEditor() {
  var canvas = state._fabricCanvas;
  if (!canvas) { showToast('画布未就绪'); return; }
  // 退出当前工具
  if (typeof window.setShotTool === 'function') window.setShotTool(null);
  canvas.discardActiveObject();
  canvas.defaultCursor = 'default';
  // 确保画布允许对象选中
  canvas.selection = true;

  // 清理之前可能残留的裁剪 UI
  var oldBar = document.getElementById('cropConfirmBar');
  if (oldBar) oldBar.remove();

  // 创建裁剪选区矩形（默认占画布 80%）
  var cw = canvas.width, ch = canvas.height;
  var rw = Math.round(cw * 0.8), rh = Math.round(ch * 0.8);
  var rx = Math.round((cw - rw) / 2), ry = Math.round((ch - rh) / 2);
  var cropRect = new fabric.Rect({
    left: rx, top: ry, width: rw, height: rh,
    fill: 'rgba(0,206,201,0.08)',
    stroke: '#00cec9',
    strokeWidth: 2,
    strokeUniform: true,
    cornerColor: '#00cec9',
    cornerSize: 14,
    cornerStyle: 'circle',
    transparentCorners: false,
    hasRotatingPoint: false,
    lockRotation: true,
    borderColor: '#00cec9',
    borderScaleFactor: 1.5,
    selectable: true,
    evented: true,
    lockMovementX: false,
    lockMovementY: false,
    lockScalingX: false,
    lockScalingY: false,
    lockUniScaling: false,
    padding: 6
  });
  canvas.add(cropRect);
  canvas.setActiveObject(cropRect);
  canvas.renderAll();

  state._cropRect = cropRect;
  state._cropMode = true;

  // 动态添加确认/取消栏
  var bar = document.createElement('div');
  bar.id = 'cropConfirmBar';
  bar.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;background:var(--card2);border-top:1px solid var(--border);position:absolute;bottom:0;left:0;right:0;z-index:100';
  bar.innerHTML = '<span style="font-size:13px;color:var(--text2)">拖拽四角调整裁剪区域</span>' +
    '<button class="btn btn-ghost" id="btnCropCancel" style="padding:6px 16px;font-size:13px">取消</button>' +
    '<button class="btn btn-accent" id="btnCropApply" style="padding:6px 16px;font-size:13px">确定裁剪</button>';
  var shotModal = document.querySelector('.shot-modal');
  if (shotModal) {
    shotModal.style.position = 'relative';
    shotModal.appendChild(bar);
  }
  document.getElementById('btnCropCancel').onclick = function(e) {
    e.stopPropagation();
    cancelCrop();
  };
  document.getElementById('btnCropApply').onclick = function(e) {
    e.stopPropagation();
    applyCrop();
  };
}

// 取消裁剪
function cancelCrop() {
  var canvas = state._fabricCanvas;
  if (state._cropRect && canvas) {
    canvas.remove(state._cropRect);
    canvas.renderAll();
  }
  state._cropRect = null;
  state._cropMode = false;
  var bar = document.getElementById('cropConfirmBar');
  if (bar) bar.remove();
  if (canvas) canvas.selection = false;
}

// 应用裁剪：保留框内内容，删除框外内容
function applyCrop() {
  var canvas = state._fabricCanvas;
  var cropRect = state._cropRect;
  if (!canvas || !cropRect) { cancelCrop(); return; }

  // 获取裁剪选区在画布上的坐标（已考虑变形）
  var bounds = cropRect.getBoundingRect();
  var cx = bounds.left, cy = bounds.top, cw = bounds.width, ch = bounds.height;
  if (cw < 10 || ch < 10) { showToast('裁剪区域太小'); return; }

  // 获取背景图原始尺寸
  var bgImg = canvas.backgroundImage;
  if (!bgImg) { showToast('没有背景图'); cancelCrop(); return; }

  // 画布坐标系 → 背景图原始像素坐标系
  var scaleX = bgImg.width / canvas.width;
  var scaleY = bgImg.height / canvas.height;
  var sx = Math.round(cx * scaleX);
  var sy = Math.round(cy * scaleY);
  var sw = Math.round(cw * scaleX);
  var sh = Math.round(ch * scaleY);

  // 导出裁剪后的背景图
  var srcCanvas = fabric.util.createCanvasElement();
  srcCanvas.width = bgImg.width;
  srcCanvas.height = bgImg.height;
  var srcCtx = srcCanvas.getContext('2d');
  srcCtx.drawImage(bgImg._element, 0, 0);

  var outCanvas = fabric.util.createCanvasElement();
  outCanvas.width = sw;
  outCanvas.height = sh;
  var outCtx = outCanvas.getContext('2d');
  outCtx.drawImage(srcCanvas, sx, sy, sw, sh, 0, 0, sw, sh);

  var newBgUrl = outCanvas.toDataURL('image/png');

  // 移除裁剪矩形
  canvas.remove(cropRect);
  state._cropRect = null;
  state._cropMode = false;
  var bar = document.getElementById('cropConfirmBar');
  if (bar) bar.remove();

  // 移除完全在裁剪区域外的标注对象
  var toRemove = [];
  canvas.forEachObject(function(obj) {
    if (obj === cropRect) return;
    var ob = obj.getBoundingRect();
    // 如果对象完全在裁剪区外则移除
    if (ob.left + ob.width < cx || ob.left > cx + cw ||
        ob.top + ob.height < cy || ob.top > cy + ch) {
      toRemove.push(obj);
    }
  });
  toRemove.forEach(function(obj) { canvas.remove(obj); });

  // 更新画布尺寸
  var newScaleX = canvas.width / cw;
  var newScaleY = canvas.height / ch;
  var finalScale = Math.min(newScaleX, newScaleY);
  canvas.setWidth(sw);
  canvas.setHeight(sh);

  // 加载裁剪后的背景图
  var newImg = new Image();
  newImg.onload = function() {
    var fi = new fabric.Image(newImg, {
      scaleX: sw / newImg.width,
      scaleY: sh / newImg.height
    });
    canvas.setBackgroundImage(fi, function() {
      canvas.selection = false;
      canvas.defaultCursor = 'crosshair';
      // 调整残留被裁切对象的坐标
      canvas.forEachObject(function(obj) {
        if (obj === state._cropRect) return;
        obj.left = (obj.left - cx) * finalScale / newScaleX;
        obj.top = (obj.top - cy) * finalScale / newScaleY;
      });
      canvas.renderAll();
      pushHistory();
      showToast('裁剪完成');
    });
  };
  newImg.onerror = function() { showToast('裁剪图片加载失败'); };
  newImg.src = newBgUrl;
}

// 11. 发送
function shotSend() {
  var canvas = state._fabricCanvas;
  if (!canvas) { showToast('画布未就绪'); return; }
  state._pendingCaption = '';  // 编辑页无说明输入框，直接发送图片
  // 把背景图画到画布上
  canvas.discardActiveObject();
  var dataUrl = canvas.toDataURL({ format: 'png', quality: 0.92 });
  // 限制大小：超过 1MB 就降质
  if (dataUrl.length > 1024 * 1024) {
    dataUrl = canvas.toDataURL({ format: 'jpeg', quality: 0.8 });
  }
  state._pendingImage = 'IMG:' + dataUrl;
  state.showShotEditor = false;
  doSend();
}

// 12. 群消息审核操作
function reviewMsg(rid, action) {
  var review = (store.groupMsgReviews || []).find(function(r) { return r.id === rid; });
  if (!review) return;
  var g = groupById(review.groupId);
  if (!g) return;
  var msg = g.msgs.find(function(m) { return m.id === rid; });
  if (action === 'approve') {
    review.status = 'approved';
    if (msg) msg.reviewStatus = 'approved';
    showToast('已通过');
  } else {
    review.status = 'rejected';
    if (msg) {
      g.msgs = g.msgs.filter(function(m) { return m.id !== rid; });
    }
    showToast('已拒绝');
  }
  saveStore();
  render();
}

// 13. 快捷键
function bindShotShortcuts() {
  if (!state.showShotRegion && !state.showShotEditor) return;
  function onKey(e) {
    if (e.key === 'Escape') {
      e.preventDefault();
      if (state.showShotRegion) cancelShotRegion();
      else if (state.showShotEditor) state.showShotEditor = false;
      render();
      return;
    }
    if (e.key === 'Enter' && !e.shiftKey) {
      if (state.showShotEditor && !(e.target && (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT'))) {
        e.preventDefault();
        shotSend();
        return;
      }
    }
    if (state.showShotEditor && (e.target && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT')) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); shotUndo(); return; }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'Z' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); shotRedo(); return; }
      if (e.key === 'r' || e.key === 'R') window.setShotTool('rect');
      else if (e.key === 'o' || e.key === 'O') window.setShotTool('ellipse');
      else if (e.key === 'a' || e.key === 'A') window.setShotTool('arrow');
      else if (e.key === 'p' || e.key === 'P') window.setShotTool('pen');
      else if (e.key === 't' || e.key === 'T') window.setShotTool('text');
      else if (e.key === 'm' || e.key === 'M') window.setShotTool('mosaic');
    }
  }
  document.addEventListener('keydown', onKey);
  // 卸载时移除
  state._shotShortcutCleanup = function() { document.removeEventListener('keydown', onKey); };
}

// + 按钮菜单控制
function initPlusMenu() {
  var plusBtn = document.getElementById('plusBtn');
  if (!plusBtn) return;

  // 点击+按钮切换面板显示（和表情面板互斥）
  plusBtn.onclick = function(e) {
    e.stopPropagation();
    if (!state.showPlus) {
      // 即将打开加号面板，先收起软键盘
      var mi = $('#msgInput');
      if (mi) mi.blur();
    }
    state.showPlus = !state.showPlus;
    state.showEmoji = false;
    render();
  };

  // 菜单项点击：执行动作并收起面板
  setTimeout(function() {
    var pm = document.getElementById('plusMenu');
    if (!pm) return;
    pm.querySelectorAll('.plus-menu-item').forEach(function(item) {
      item.onclick = function(e) {
        e.stopPropagation();
        var action = this.getAttribute('data-act');
        // 相册/拍摄/文件必须同步触发系统选择器，否则移动端会因脱离用户手势被拦截
        if (action === 'send-image' || action === 'shoot' || action === 'send-file') {
          handlePlusMenuAction(action);
          state.showPlus = false;
          render();
        } else {
          state.showPlus = false;
          render();
          setTimeout(function() { handlePlusMenuAction(action); }, 50);
        }
      };
    });
  }, 60);

  // 处理菜单项动作
  function handlePlusMenuAction(action) {
    switch(action) {
      case 'send-image':
        var fp = document.getElementById('filePicker');
        if (fp) fp.click();
        break;
      case 'shoot':
        if (typeof showCustomCamera === 'function') {
          showCustomCamera();
        } else {
          var cp = document.getElementById('cameraPicker');
          if (cp) cp.click();
        }
        break;
      case 'send-file':
        var fp2 = document.getElementById('filePicker2');
        if (fp2) fp2.click();
        break;
      case 'send-location':
        sendLocation();
        break;
      case 'send-voice':
        openVoiceInput();
        break;
    }
  }
}

// 在每次渲染后重新初始化菜单
var originalRender = window.render;
window.render = function() {
  originalRender();
  setTimeout(initPlusMenu, 0);
};

// 移动端键盘弹出时，自动调整布局高度并滚动到底部（微信风格）
(function initKeyboardHandler() {
  function onViewportResize() {
    var vv = window.visualViewport;
    if (!vv) return;
    var app = document.getElementById('app');
    if (app) {
      app.style.height = vv.height + 'px';
    }
    var ml = document.getElementById('msgList');
    if (ml) {
      ml.scrollTop = ml.scrollHeight;
    }
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', onViewportResize);
  }
  // 输入框聚焦时延迟滚动到底部
  document.addEventListener('focusin', function(e) {
    if (e.target && (e.target.id === 'msgInput' || e.target.classList.contains('msg-input'))) {
      setTimeout(function() {
        var ml = document.getElementById('msgList');
        if (ml) ml.scrollTop = ml.scrollHeight;
      }, 300);
    }
  });


  // 全局点击：点面板外任意位置关闭表情面板和加号面板
  // 只注册一次，每次动态获取元素（避免 render() 后旧引用失效）
  document.addEventListener('click', function(e) {
    // ① 动态获取最新面板元素
    var ep = document.getElementById('emojiPanel');
    var pm = document.getElementById('plusMenu');

    // ② 点击表情面板内部（tab/表情/空白）→ 不关闭
    if (ep && ep.contains(e.target)) return;

    // ③ 点击加号面板内部 → 不关闭
    if (pm && pm.contains(e.target)) return;

    // ④ 关闭表情面板（点击面板外任意位置）
    if (ep && state.showEmoji) {
      state.showEmoji = false;
      render();
      return;
    }

    // ⑤ 关闭加号面板（点击面板外任意位置）
    if (pm && state.showPlus) {
      state.showPlus = false;
      render();
    }
  });
})();

render();

// ===== 自定义相机（替代系统相机，去掉 ×/✓ 确认页）=====
var _camStream = null;      // 当前媒体流
var _camFacing = 'environment'; // 'environment' 后置 | 'user' 前置
var _camPhotoData = '';    // 拍照后的 base64 数据
var _camVideo = null;        // video 元素引用
var _camCanvas = null;       // 隐藏 canvas 用于截图

function showCustomCamera() {
  var overlay = document.getElementById('customCamera');
  var video = document.getElementById('cameraVideo');
  var errEl = document.getElementById('cameraError');
  if (errEl) { errEl.textContent = ''; errEl.classList.remove('show'); }
  if (!overlay || !video) { showToast('相机 UI 初始化失败'); return; }
  _camVideo = video;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    if (errEl) {
      errEl.textContent = '⚠ 当前页面未使用 HTTPS，无法访问摄像头\n自动切换为系统相机...';
      errEl.classList.add('show');
    }
    setTimeout(function() {
      var cp = document.getElementById('cameraPicker');
      if (cp) cp.click();
    }, 500);
    return;
  }
  var constraints = {
    video: { facingMode: _camFacing, width: { ideal: 1920 }, height: { ideal: 1080 } },
    audio: false
  };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      _camStream = stream;
      video.srcObject = stream;
      video.play();
      overlay.classList.add('active');
      var track = stream.getVideoTracks()[0];
      var flashBtn = document.getElementById('camFlashBtn');
      if (flashBtn && track && track.getCapabilities && track.getCapabilities().torch !== undefined) {
        flashBtn.style.display = '';
      }
    })
    .catch(function(err) {
      console.error('[自定义相机] 启动失败:', err);
      if (errEl) {
        errEl.textContent = '⚠ 无法启动相机：' + (err.message || '权限被拒绝') + '\n请允许浏览器访问摄像头';
        errEl.classList.add('show');
      }
      setTimeout(function() {
        var cp = document.getElementById('cameraPicker');
        if (cp) cp.click();
      }, 1500);
    });
}

// ===== 语音输入 =====
var _voiceRec = null;   // SpeechRecognition 实例
var _voiceTimer = null; // 超时定时器

function openVoiceInput() {
  if (!state.activeChat) { showToast('请先选择聊天'); return; }
  // 检查浏览器支持
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('⚠ 当前浏览器不支持语音识别\n请使用 Chrome/Edge 浏览器');
    return;
  }
  state.voiceActive = true;
  state.voiceText = '';
  state.voiceError = '';
  render();
  startVoiceRecognition();
}

function startVoiceRecognition() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  // 停止之前的实例
  if (_voiceRec) { try { _voiceRec.stop(); } catch(e) {} }

  _voiceRec = new SR();
  _voiceRec.lang = state.voiceLang || 'zh-CN';
  _voiceRec.continuous = true;   // 连续识别
  _voiceRec.interimResults = true; // 返回中间结果
  _voiceRec.maxAlternatives = 1;

  _voiceRec.onstart = function() {
    state.voiceError = '';
    render();
    showToast('🎙 正在聆听...说完自动识别');
  };

  _voiceRec.onresult = function(e) {
    var interim = '';
    var final = '';
    for (var i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    state.voiceText = final || interim;
    render();
  };

  _voiceRec.onerror = function(e) {
    console.error('[语音识别] 错误:', e.error);
    var msg = '';
    if (e.error === 'not-allowed') {
      msg = '⚠ 请允许浏览器访问麦克风';
    } else if (e.error === 'no-speech') {
      msg = '未检测到语音，请重试';
    } else if (e.error === 'network') {
      msg = '⚠ 网络错误，请检查网络连接';
    } else {
      msg = '⚠ 识别错误：' + e.error;
    }
    state.voiceError = msg;
    render();
  };

  _voiceRec.onend = function() {
    // 正常结束，不做特殊处理（用户点"完成"时手动停止）
    console.log('[语音识别] 结束');
  };

  try {
    _voiceRec.start();
  } catch(err) {
    state.voiceError = '启动语音识别失败：' + (err.message || err);
    render();
  }
}

function stopVoiceRecognition() {
  if (_voiceRec) {
    try { _voiceRec.stop(); } catch(e) {}
    _voiceRec = null;
  }
}

function confirmVoiceInput() {
  stopVoiceRecognition();
  var text = (state.voiceText || '').trim();
  if (text) {
    var mi = document.getElementById('msgInput');
    if (mi) {
      // 追加到输入框（不覆盖已有内容）
      if (mi.value && mi.value.trim()) {
        mi.value = mi.value.trim() + ' ' + text;
      } else {
        mi.value = text;
      }
      mi.focus();
      // 触发 input 事件让 UI 更新
      mi.dispatchEvent(new Event('input'));
    }
    showToast('✅ 已填入输入框');
  }
  state.voiceActive = false;
  state.voiceText = '';
  render();
}

function cancelVoiceInput() {
  stopVoiceRecognition();
  state.voiceActive = false;
  state.voiceText = '';
  state.voiceError = '';
  render();
}

function toggleVoiceLang() {
  // 切换方言：普通话 → 粤语 → 台语 → 普通话
  var langs = [
    { code: 'zh-CN', name: '普通话' },
    { code: 'zh-HK', name: '粤语' },
    { code: 'zh-TW', name: '台语' }
  ];
  var idx = langs.findIndex(function(l) { return l.code === state.voiceLang; });
  idx = (idx + 1) % langs.length;
  state.voiceLang = langs[idx].code;
  showToast('已切换为：' + langs[idx].name);
  // 如果正在识别，重启以应用新语言
  if (_voiceRec) {
    stopVoiceRecognition();
    setTimeout(startVoiceRecognition, 300);
  }
  render();
}

// 渲染语音输入界面
function renderVoiceOverlay() {
  if (!state.voiceActive) return '';
  var text = state.voiceText || '';
  var placeholder = !text ? '请开始说话...' : '';
  var err = state.voiceError || '';
  var langName = state.voiceLang === 'zh-HK' ? '粤语' : (state.voiceLang === 'zh-TW' ? '台语' : '普通话');
  return '' +
    '<div class="voice-overlay active" id="voiceOverlay">' +
      '<button class="voice-lang" onclick="toggleVoiceLang()" title="切换方言">' + langName + '</button>' +
      '<div class="voice-tip">点击麦克风开始说话</div>' +
      '<div class="voice-mic ' + (_voiceRec ? 'recording' : '') + '" onclick="toggleVoiceRec()">🎙</div>' +
      '<div class="voice-text ' + (!text ? 'placeholder' : '') + '" id="voiceText">' + escapeHtml(text || placeholder) + '</div>' +
      (err ? '<div class="voice-error">' + escapeHtml(err) + '</div>' : '') +
      '<div class="voice-actions">' +
        '<button class="voice-cancel" onclick="cancelVoiceInput()">取消</button>' +
        '<button class="voice-confirm" onclick="confirmVoiceInput()">填入输入框</button>' +
      '</div>' +
    '</div>';
}

function toggleVoiceRec() {
  if (_voiceRec) {
    stopVoiceRecognition();
    showToast('⏸ 已停止识别');
  } else {
    startVoiceRecognition();
  }
}
